<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NOBI FILE MANAGER 😈💻</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" xintegrity="sha512-..." crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    /* GitHub Log Popup Styles */
    #github-log-popup {
      display: none; /* Hidden by default */
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    #github-log-content {
      background: #282c34; /* Darker background for the log */
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
      width: 90%;
      max-width: 700px;
      max-height: 80%; /* Limit height */
      display: flex;
      flex-direction: column;
      color: #e0e0e0; /* Light text color */
      font-family: 'Consolas', 'Monaco', monospace; /* Monospaced font for logs */
      border: 1px solid #61dafb; /* Accent border */
    }

    #github-log-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 1px solid #444;
    }

    #github-log-header h2 {
      margin: 0;
      color: #61dafb; /* Accent color for heading */
      font-size: 1.5em;
    }

    #github-log-header button {
      background: #f44336; /* Red for close */
      color: white;
      border: none;
      border-radius: 5px;
      padding: 8px 15px;
      cursor: pointer;
      font-size: 0.9em;
      transition: background-color 0.3s ease;
    }

    #github-log-header button:hover {
      background-color: #d32f2f;
    }

    #github-log-area {
      flex-grow: 1; /* Allows the textarea to fill available space */
      background: #1e1e1e; /* Even darker for the log area */
      border: 1px solid #333;
      padding: 15px;
      font-size: 0.9em;
      line-height: 1.4;
      overflow-y: auto; /* Scrollable */
      white-space: pre-wrap; /* Preserve whitespace and wrap text */
      word-wrap: break-word; /* Break long words */
      border-radius: 5px;
      color: #c0c0c0;
    }

    #githubSpinner {
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top: 4px solid #61dafb;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      animation: spin 1s linear infinite;
      margin-left: 10px;
      display: none; /* Hidden by default */
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- --- Authentication Check and Header Start --- -->
  <script>
    // Ye script page load hote hi run hoga.
    // Check karega ki admin authenticated hai ya nahi.
    const adminToken = localStorage.getItem('adminToken');
    const adminLoggedInUser = JSON.parse(localStorage.getItem('adminLoggedInUser'));

    if (!adminToken || !adminLoggedInUser || !adminLoggedInUser.username || !adminLoggedInUser.userId) {
        console.warn("Admin token ya user data missing/invalid. Redirecting to login.");
        // window.location.replace() use karein taki back button se protected page par wapis na aa saken.
        window.location.replace('/admin-login.html');
    }

    // --- Helper Functions for Authentication and UI (Global scope mein) ---

    // Logout function
    function logoutAdmin() {
        localStorage.removeItem('adminToken');
        localStorage.removeItem('adminLoggedInUser');
        localStorage.removeItem('adminUsername'); // 'Remember Me' ke liye
        localStorage.removeItem('adminRememberMe'); // 'Remember Me' ke liye
        showToast('Logged out successfully.', 'info');
        setTimeout(() => {
            window.location.replace('/admin-login.html'); // Redirect to login page after logout
        }, 500);
    }

    // Show Toast Notification Function
    function showToast(message, type = 'success') {
        const container = document.getElementById('toast-container');
        if (!container) {
            console.warn('Toast container not found. Cannot show toast:', message);
            return;
        }
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.textContent = message;
        container.appendChild(toast);
        // Toast ko 3 seconds baad remove karein
        setTimeout(() => { toast.remove(); }, 3000);
    }

    // Apply Initial Theme
    function applyInitialTheme() {
        const isDarkMode = localStorage.getItem('darkMode') === 'true';
        document.body.classList.toggle('dark-mode', isDarkMode);
        const themeToggle = document.getElementById('theme-toggle');
        if (themeToggle) {
          themeToggle.checked = isDarkMode;
        }
    }

    // Toggle Theme
    function toggleTheme(e) {
        document.body.classList.toggle('dark-mode', e.target.checked);
        localStorage.setItem('darkMode', e.target.checked);
    }

    // DOMContentLoaded par theme apply karein
    document.addEventListener('DOMContentLoaded', applyInitialTheme);

    // --- API Action Helper Function (Authentication ke saath) ---
    // Ye function har API call ko wrap karega aur Authorization header add karega.
    async function performFileManagerApiAction(path, opts = {}) {
        const adminToken = localStorage.getItem('adminToken');
        if (!adminToken) {
            // Agar token nahi hai, to redirect kar do, waise initial check se catch ho jayega
            showToast('Session expired. Please log in again.', 'error');
            logoutAdmin();
            throw new Error('Authentication required.');
        }

        const url = '/api/file-manager' + path;
        const headers = {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${adminToken}`, // JWT token add kiya
            ...(opts.headers || {}) // Aur koi custom headers hain to unhe merge kar do
        };

        const finalOpts = {
            ...opts,
            headers: headers,
        };

        // Agar body object hai to JSON.stringify karein
        if (finalOpts.body && typeof finalOpts.body !== 'string') {
            finalOpts.body = JSON.stringify(finalOpts.body);
        }

        try {
            const res = await fetch(url, finalOpts);

            if (res.status === 401 || res.status === 403) {
                // Agar session expired ya unauthorized hai, to logout kar do
                const errorData = await res.json().catch(() => ({ message: 'Authentication failed or session expired.' }));
                showToast(errorData.message || 'Session expired. Please log in again.', 'error');
                logoutAdmin();
                throw new Error(errorData.message || 'Unauthorized access');
            }

            if (!res.ok) {
                // Normal HTTP errors
                let msg = 'Error: ' + res.status;
                try { let js = await res.json(); msg = js.error || msg; } catch{}
                throw new Error(msg);
            }

            // DELETE operations ke liye response empty ho sakta hai, isliye handle karein
            if (opts.method === 'DELETE') {
                 // Depend karta hai backend kya return karta hai, yahan generic success
                 return res.status === 204 ? {} : await res.json().catch(() => ({ success: true }));
            }

            return await res.json();
        } catch (error) {
            console.error("File Manager API Error:", error);
            // showToast function already error display kar chuki hai
            throw error; // Re-throw error ताकि calling function bhi handle kar sake agar zaroori ho
        }
    }

    // --- GitHub Log Functionality ---
    let githubLogState = [];
    let githubPushInProgress = false;

    function showGithubLogPopup() {
      // Load previous state if available and no push is in progress
      const prev = sessionStorage.getItem('githubLogState');
      if (prev && !githubPushInProgress) {
        try {
          githubLogState = JSON.parse(prev);
        } catch (e) {
          console.error("Error parsing stored githubLogState:", e);
          githubLogState = []; // Reset if corrupted
        }
      } else if (!githubPushInProgress) {
        githubLogState = []; // Clear if starting a new session and no push in progress
      }
      document.getElementById('github-log-popup').style.display = 'flex';
      renderGithubLog();
    }

    function closeGithubLogPopup() {
      document.getElementById('github-log-popup').style.display = 'none';
      sessionStorage.setItem('githubLogState', JSON.stringify(githubLogState));
    }

    function renderGithubLog() {
      const area = document.getElementById('github-log-area');
      area.textContent = githubLogState.join('\n');
      area.scrollTop = area.scrollHeight; // Auto-scroll to bottom
      document.getElementById('githubSpinner').style.display = githubPushInProgress ? 'inline-block' : 'none';
    }

    function githubLog(line) {
      githubLogState.push(line);
      // Keep only the last 100 lines to prevent memory issues
      if (githubLogState.length > 100) {
        githubLogState = githubLogState.slice(-100);
      }
      renderGithubLog();
      // Save state to session storage periodically (or on every update)
      sessionStorage.setItem('githubLogState', JSON.stringify(githubLogState));
    }

    // Event listener for the GitHub Push button (assuming it exists)
    // You'll need to add a button with id="github-upload-btn" in your HTML
    document.addEventListener('DOMContentLoaded', () => {
      const githubUploadBtn = document.getElementById('github-upload-btn');
      if (githubUploadBtn) {
        githubUploadBtn.addEventListener('click', async function() {
          // Clear previous log state and set push in progress
          githubLogState = [];
          sessionStorage.removeItem('githubLogState'); // Clear session storage on new push
          githubPushInProgress = true;
          showGithubLogPopup();
          githubLog('[Connecting to GitHub...]');

          try {
            const adminToken = localStorage.getItem('adminToken');
            if (!adminToken) {
                githubLog('[ERROR] Admin token not found. Please log in.');
                githubPushInProgress = false;
                renderGithubLog();
                return;
            }
            const message = encodeURIComponent('Full push from NOBI FILE MANAGER 😈');

            // --- SSE Stream
            // Pass token as query parameter as per the prompt's instruction for SSE
            const eventSource = new EventSource(`/api/admin/push-to-github/stream?token=${encodeURIComponent(adminToken)}&message=${message}`);

            eventSource.onmessage = function(event) {
              if (event.data === '[GITHUB_DONE]') {
                githubPushInProgress = false;
                renderGithubLog();
                eventSource.close(); // Close the connection when done
                githubLog('[COMPLETE] GitHub push done!');
                showToast('GitHub push complete!', 'success');
                return;
              }
              githubLog(event.data);
            };

            eventSource.onerror = function(e) {
              githubPushInProgress = false;
              renderGithubLog();
              eventSource.close(); // Close on error as well
              githubLog('[ERROR] Connection error or server stopped.');
              showToast('GitHub push encountered an error.', 'error');
            };

          } catch (e) {
            githubPushInProgress = false;
            githubLog('[ERROR] ' + e.message);
            renderGithubLog();
            showToast('Failed to start GitHub push.', 'error');
          }
        });
      }

      // Event listener for closing the GitHub log popup
      const closeGithubLogBtn = document.getElementById('close-github-log-popup');
      if (closeGithubLogBtn) {
        closeGithubLogBtn.addEventListener('click', closeGithubLogPopup);
      }
    });

  </script>
  <!-- --- Authentication Check and Header End --- -->

  <div id="container">
    <div id="sidebar">
      <div id="sidebar-header">
        <span>📁 FILES</span>
        <!-- Logout Button and Theme Toggle (added to sidebar-header) -->
        <button id="logoutBtn" title="Logout">Logout</button>
        <div class="theme-switch" style="margin-left: 10px; display: flex; align-items: center; gap: 5px;">
            <span>☀️</span>
            <label class="switch">
                <input type="checkbox" id="theme-toggle">
                <span class="slider"></span>
            </label>
            <span>🌙</span>
        </div>
        <button id="backBtn" title="Back">⬅️</button>
      </div>
      <div id="breadcrumb-bar" class="breadcrumb-bar"></div>
      <div id="file-search-bar">
        <input type="text" id="search-input" placeholder="Search files/folders...">
      </div>
      <div id="file-list"></div>
      <div id="sidebar-footer">
        <button class="add-folder" title="Add Folder"><i class="fas fa-folder-plus"></i></button>
        <button class="add-file" title="Add File"><i class="fas fa-file"></i></button>
        <button class="upload-files" onclick="document.getElementById('file-upload').click()" title="Upload Files"><i class="fas fa-upload"></i></button>
        <input type="file" id="file-upload" multiple style="display:none;">
        <button class="refresh" title="Refresh"><i class="fas fa-arrows-rotate"></i></button>
        <!-- GitHub Push Button Added Here -->
        <button id="github-upload-btn" title="Push All Files to GitHub"><i class="fab fa-github"></i> Push All</button>
      </div>
    </div>
    <div id="main"></div>
  </div>
  <div id="popup">
    <div id="popup-content"></div>
  </div>
  <div id="popup-editor">
    <div id="popup-editor-content">
      <div class="editor-filename"></div>
      <div id="find-replace-bar" style="display:none;"></div>
      <div id="editor-wrapper">
        <textarea id="code-editor" name="code"></textarea>
      </div>
      <div class="popup-editor-actions">
        <button type="button" class="save">Save</button>
        <button type="button" class="cancel">Cancel</button>
        <button type="button" class="findreplace-btn" title="Find & Replace"><i class="fas fa-search"></i></button>
      </div>
    </div>
  </div>

  <button id="floating-back-btn" title="Go Back">⬅️</button>

  <div id="bulk-actions-bar">
    <button class="select-all" onclick="selectAllFiles()">Select All</button>
    <button class="deselect-all" onclick="deselectAllFiles()">Deselect All</button>
    <button class="delete-selected" onclick="bulkDelete()">Delete Selected</button>
  </div>

  <!-- Toast Container for notifications -->
  <div id="toast-container"></div>

  <!-- GitHub Log Popup Structure -->
  <div id="github-log-popup">
    <div id="github-log-content">
      <div id="github-log-header">
        <h2>GitHub Push Log <span id="githubSpinner"></span></h2>
        <button id="close-github-log-popup">Close</button>
      </div>
      <div id="github-log-area"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>

  <script src="script.js"></script>
  
</body>
