<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verify Karein - Nobita Feedback</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #6a0dad; --secondary-color: #FFD700; --accent-color: #3B82F6;
            --text-color-light: #f4f4f9; --bg-gradient-start: #1a1a2e; --bg-gradient-end: #16213e;
            --card-bg: rgba(255, 255, 255, 0.1); --card-border: rgba(255, 255, 255, 0.2);
            --input-bg: rgba(255, 255, 255, 0.08); --shadow-deep: 0 10px 30px rgba(0, 0, 0, 0.4);
            --success-color: #28a745; --error-color: #dc3545;
        }
        body {
            font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            color: var(--text-color-light); display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box;
        }
        .verify-email-container { /* Renamed from reset-password-container */
            background: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid var(--card-border);
            border-radius: 20px; box-shadow: var(--shadow-deep); padding: 30px 25px;
            width: 90%; max-width: 450px; text-align: center;
        }
        .verify-email-container h2 { /* Renamed from reset-password-container h2 */
            color: var(--secondary-color); font-family: 'Luckiest Guy', cursive; font-size: 2em; margin-bottom: 20px; text-shadow: 0 0 8px rgba(255,215,0,0.3); }
        .action-button { /* Retained as action-button */
            background: linear-gradient(45deg, var(--accent-color), #2563EB); color: #fff; border: none; width: 100%; padding: 11px 20px; border-radius: 8px; font-size: 1em; font-weight: 500; cursor: pointer; transition: all 0.25s ease; box-shadow: 0 3px 10px rgba(59,130,246,0.3); margin-top: 10px; }
        .action-button:hover { background: linear-gradient(45deg, #2563EB, var(--accent-color)); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(59,130,246,0.45); }
        .action-button:disabled { background: #555; cursor: not-allowed; opacity: 0.7; }
        .message-area { margin-top: 15px; padding: 10px; border-radius: 5px; display: none; word-wrap: break-word; font-size: 0.9em; }
        .message-area.success { background-color: rgba(40, 167, 69, 0.2); border: 1px solid var(--success-color); color: var(--success-color); }
        .message-area.error { background-color: rgba(220, 53, 69, 0.2); border: 1px solid var(--error-color); color: var(--error-color); }
        .spinner { border: 4px solid rgba(255,255,255,0.3); border-radius: 50%; border-top: 4px solid var(--secondary-color); width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .home-link { display: none; margin-top: 20px; color: var(--secondary-color); text-decoration: none; font-size: 0.9em;}
        .home-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="verify-email-container"> <h2>Email Verify Karein</h2>
        <div id="initial-message">
            <p>Aapka email verify kiya ja raha hai. Kripya thoda intezaar karein.</p>
            <div class="spinner" id="loading-spinner"></div>
        </div>
        <div id="response-message" class="message-area"></div>
        <a href="/" class="home-link" id="login-page-link">Login Page Par Wapas Jaayein</a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const responseMessageDiv = document.getElementById('response-message');
            const loadingSpinner = document.getElementById('loading-spinner');
            const initialMessageDiv = document.getElementById('initial-message');
            const loginPageLink = document.getElementById('login-page-link');

            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');

            if (!token) {
                showMessage('error', 'Email verification link anuchit hai ya token nahi mila. Kripya sahi link ka istemal karein ya naya verification email request karein.');
                initialMessageDiv.style.display = 'none'; // Hide spinner and initial text
                loginPageLink.style.display = 'inline-block';
                return;
            }

            // Immediately attempt to verify email using the token
            loadingSpinner.style.display = 'block';
            initialMessageDiv.style.display = 'block';
            responseMessageDiv.style.display = 'none';

            try {
                // API URL wahi base URL hoga jo aapka main app use kar raha hai
                const response = await fetch(`/api/auth/verify-email`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token })
                });
                const data = await response.json();

                if (response.ok) {
                    showMessage('success', data.message + " Aapko ab login page par redirect kiya jayega...");
                    initialMessageDiv.style.display = 'none'; // Hide spinner and initial text
                    loginPageLink.style.display = 'inline-block'; // Show login link
                    
                    // Store the new token (which contains the updated isVerified status)
                    if (data.token) {
                        localStorage.setItem('authToken', data.token);
                    }

                    setTimeout(() => {
                        window.location.href = '/'; // Redirect to home/login page
                    }, 4000);
                } else {
                    showMessage('error', data.message || 'Email verify karne mein samasya aa gayi.');
                    initialMessageDiv.style.display = 'none'; // Hide spinner and initial text
                    loginPageLink.style.display = 'inline-block';
                }
            } catch (error) {
                console.error('Verify email request error:', error);
                showMessage('error', 'Network ya server error. Kripya baad mein try karein.');
                initialMessageDiv.style.display = 'none'; // Hide spinner and initial text
                loginPageLink.style.display = 'inline-block';
            } finally {
                loadingSpinner.style.display = 'none';
            }

            function showMessage(type, message) {
                responseMessageDiv.textContent = message;
                responseMessageDiv.className = `message-area ${type}`;
                responseMessageDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
