<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - 𝙉𝙊𝘽𝙄 𝘽𝙊𝙏</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <header>
        <div class="logo">𝙉𝙊𝘽𝙄 𝘽𝙊𝙏</div>
        <nav>
            <button class="nav-toggle">☰</button>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/login.html">Login/Signup</a></li>
            </ul>
        </nav>
    </header>

    <main class="auth-container">
        <h2>Forgot Password</h2>
        <form id="forgot-password-form">
            <div class="form-group">
                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <button type="submit" class="auth-button">Send Reset Email</button>
            <p class="mt-1"><a href="/login.html">Back to Login</a></p>
        </form>
        <div id="forgot-password-message" class="mt-2" style="display: none;"></div>
    </main>

    <footer>
        <p>© 2025 Nobi Bot</p>
    </footer>

    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
