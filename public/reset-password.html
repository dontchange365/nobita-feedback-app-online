<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verification - Nobita's Feedback Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --primary-color: #6a0dad; /* Dark Purple */
            --secondary-color: #FFD700; /* Gold */
            --accent-color: #3B82F6; /* Bright Blue */
            --text-color-light: #f4f4f9; /* Off-white */
            --bg-gradient-start: #1a1a2e; /* Darker Purple Blue */
            --bg-gradient-end: #16213e; /* Even Darker Purple Blue */
            --card-bg-popup: #272c3a; /* Darker grey for popup */
            --shadow-deep: 0 10px 30px rgba(0, 0, 0, 0.5);
            --success-color: #28a745; /* Green */
            --error-color: #dc3545; /* Red */
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            color: var(--text-color-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }
        .container {
            background: var(--card-bg-popup);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 40px 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: var(--shadow-deep);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .icon {
            font-size: 4em;
            margin-bottom: 20px;
        }
        .icon.success { color: var(--success-color); }
        .icon.error { color: var(--error-color); }
        .icon.loading { color: var(--secondary-color); animation: spin 1.5s linear infinite; }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h1 {
            color: var(--secondary-color);
            font-size: 2em;
            margin-bottom: 15px;
        }
        p {
            font-size: 1.1em;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        .button {
            background: var(--accent-color);
            color: #fff;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            text-decoration: none;
            display: inline-block;
        }
        .button:hover {
            background: #3578e0;
            transform: translateY(-2px);
        }
        .error-details {
            font-size: 0.9em;
            color: #f8d7da; /* Light red for error details */
            background-color: #721c24; /* Dark red background */
            border: 1px solid #f5c6cb;
            border-radius: .25rem;
            padding: .75rem 1.25rem;
            margin-top: 15px;
            word-break: break-all; /* Break long error messages */
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }
            h1 {
                font-size: 1.7em;
            }
            p {
                font-size: 1em;
            }
            .button {
                padding: 10px 20px;
            }
        }
    </style>
</head>
<body>
  
  <body>
  <div class="reset-navbar">
    <div class="reset-nav-left">
      <img src="https://i.ibb.co/FsSs4SG/creator-avatar.png" class="reset-nav-logo" alt="Nobita" />
    </div>
    <div class="reset-nav-title">Nobita Feedback</div>
    <div class="reset-nav-right">
      <div class="reset-login-icon">
        <i class="fas fa-user-circle"></i>
      </div>
    </div>
  </div>
  <div class="reset-container animated-card" id="mainCard">
    <div id="statusIcon" class="reset-icon loading animate-bounce">
      <i class="fas fa-spinner fa-spin"></i>
    </div>
    <h1 id="statusTitle">Verifying your email...</h1>
    <p id="statusMessage">Please wait while we confirm your email address. This may take a moment.</p>
    <div id="errorDetails" class="reset-error-details" style="display: none;"></div>
    <a href="index.html" id="homeButton" class="reset-button" style="display: none;">Go to Feedback Portal</a>
  </div>
  <canvas id="glow-bg"></canvas>
  <style>
    :root {
      --primary-color: #6a0dad;
      --secondary-color: #FFD700;
      --accent-color: #3B82F6;
      --danger-color: #e3476d;
      --success-color: #24d282;
      --text-color-light: #f4f4f9;
      --bg-gradient-start: #1a1a2e;
      --bg-gradient-end: #16213e;
    }
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(120deg, var(--bg-gradient-start), var(--primary-color));
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
      color: var(--text-color-light);
      text-align: center;
    }
    #glow-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      width: 100vw;
      height: 100vh;
      background: transparent;
    }
    .reset-navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 28px 8px 24px;
      width: 100%;
      background: rgba(44,62,80,0.95);
      border-radius: 0 0 18px 18px;
      box-shadow: 0 2px 16px 1px #0008;
      position: sticky; top: 0; z-index: 11;
      gap: 12px;
      animation: slideDownNav 1s cubic-bezier(.35,2,.52,1) .2s backwards;
    }
    @keyframes slideDownNav {
      0% { transform: translateY(-80px); opacity:0; }
      100% { transform: translateY(0); opacity:1;}
    }
    .reset-nav-logo {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 2px solid var(--secondary-color);
      box-shadow: 0 0 16px #ffd700a0, 0 0 6px #fff2;
      background: #333;
      object-fit: cover;
      animation: pulseAvatar 2.3s infinite alternate;
    }
    @keyframes pulseAvatar {
      0% { box-shadow: 0 0 10px #ffd70090;}
      100% { box-shadow: 0 0 22px #ffd700e0, 0 0 6px #fff3;}
    }
    .reset-nav-title {
      flex: 1;
      text-align: center;
      font-size: 1.45em;
      color: var(--secondary-color);
      font-weight: 700;
      letter-spacing: .8px;
      text-shadow: 0 2px 14px #fff1,0 0 10px #ffd70044;
      transition: font-size .18s;
      filter: brightness(1.11);
      user-select: none;
    }
    .reset-login-icon {
      font-size: 2em;
      color: var(--accent-color);
      background: #fff2;
      border-radius: 50%;
      padding: 5px 7px;
      transition: background 0.18s, color .18s, box-shadow .18s;
      cursor: pointer;
      box-shadow: 0 1px 7px #0002;
      animation: fadeInIcon 1.5s;
    }
    .reset-login-icon:hover {
      background: var(--secondary-color);
      color: #371575;
      box-shadow: 0 2px 14px #FFD70070;
    }
    .reset-container {
      margin: 62px auto 0 auto;
      background: rgba(40, 40, 70, 0.97);
      border-radius: 28px;
      box-shadow: 0 8px 42px #000a, 0 0 0 4px #fff1;
      border: 2.5px solid #3b82f6cc;
      max-width: 440px;
      width: 94%;
      padding: 50px 25px 38px 25px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 5;
      animation: cardPopIn .9s cubic-bezier(.44,1.35,.54,.97) .2s backwards;
      overflow: hidden;
    }
    .animated-card {
      box-shadow: 0 0 20px 3px #3B82F6cc, 0 8px 38px #000a;
      border-image: linear-gradient(90deg,#FFD700,#3B82F6,#6a0dad,#e3476d) 1;
      border-width: 2.5px;
      border-style: solid;
      transition: box-shadow .22s,border-image .22s;
    }
    .animated-card:focus-within, .animated-card:hover {
      box-shadow: 0 0 44px 7px #FFD70066, 0 12px 36px #3b82f660;
      border-image: linear-gradient(90deg,#3B82F6,#FFD700,#e3476d,#6a0dad) 1;
    }
    @keyframes cardPopIn {
      0% { opacity:0; transform:scale(.85);}
      100% {opacity:1; transform:scale(1);}
    }
    .reset-icon {
      font-size: 4.3em;
      margin-bottom: 20px;
      color: var(--secondary-color);
      display: flex; align-items: center; justify-content: center;
      min-height: 1.3em;
      filter: drop-shadow(0 2px 6px #ffd70050);
      transition: color .25s;
    }
    .reset-icon.success {
      color: var(--success-color);
      animation: bounceIcon 1.1s cubic-bezier(.6,2.2,.45,1) 1;
      filter: drop-shadow(0 0 8px #22eea3) brightness(1.08);
    }
    .reset-icon.error {
      color: var(--danger-color);
      animation: shakeIcon .6s cubic-bezier(.7,.1,.2,1.3) 1;
      filter: drop-shadow(0 0 8px #ff3c68) brightness(1.15);
    }
    .reset-icon.loading {
      color: var(--accent-color);
      filter: drop-shadow(0 0 10px #3b82f6) brightness(1.03);
    }
    .animate-bounce { animation: bounceIcon 1.2s infinite alternate; }
    @keyframes bounceIcon {
      0% { transform: translateY(0);}
      60% { transform: translateY(-10px) scale(1.07);}
      100% { transform: translateY(0);}
    }
    @keyframes shakeIcon {
      0% { transform: translateX(0);}
      10% { transform: translateX(-8px);}
      25% { transform: translateX(6px);}
      45% { transform: translateX(-4px);}
      60% { transform: translateX(3px);}
      100% { transform: translateX(0);}
    }
    h1#statusTitle {
      color: var(--secondary-color);
      font-size: 2.1em;
      margin-bottom: 16px;
      letter-spacing: .6px;
      font-weight: 800;
      text-shadow: 0 2px 16px #ffd70020,0 1px 2px #0005;
      animation: fadeInText .9s .4s both;
    }
    @keyframes fadeInText {
      0% { opacity: 0; transform: translateY(12px);}
      100% {opacity: 1; transform: translateY(0);}
    }
    p#statusMessage {
      font-size: 1.12em;
      line-height: 1.7;
      margin-bottom: 25px;
      color: #ffe987;
      animation: fadeInText 1s .6s both;
    }
    .reset-button {
      background: linear-gradient(92deg, var(--accent-color), var(--primary-color), var(--secondary-color));
      color: #fff;
      padding: 14px 36px;
      border: none;
      border-radius: 12px;
      font-size: 1.1em;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.28s, transform 0.14s, color .19s;
      text-decoration: none;
      box-shadow: 0 2px 16px #3b82f650;
      margin-top: 18px;
      letter-spacing: 0.6px;
      position: relative;
      z-index: 2;
      animation: fadeInText 1.2s 1s both;
    }
    .reset-button:hover {
      background: linear-gradient(85deg, #FFD700, #3B82F6, #6a0dad 80%);
      color: #6a0dad;
      transform: translateY(-3px) scale(1.048);
      box-shadow: 0 6px 32px #3b82f680,0 0 30px #FFD70040;
    }
    .reset-error-details {
      font-size: 1em;
      color: #f8d7da;
      background: #3b2231;
      border: 1.5px solid #e3476d55;
      border-radius: 10px;
      padding: 14px 18px;
      margin-top: 20px;
      margin-bottom: 7px;
      box-shadow: 0 1px 8px #e3476d88;
      word-break: break-all;
      text-align: left;
      width: 97%;
      max-width: 350px;
      animation: fadeIn 0.45s ease-out;
      display: block;
    }
    @media (max-width: 500px) {
      .reset-navbar { padding: 7px 7px; }
      .reset-container { padding: 25px 3vw 19px 3vw;}
      .reset-nav-title { font-size: 1em; }
      .reset-nav-logo, .reset-login-icon { width: 32px; height: 32px; font-size: 1.2em; }
      .reset-button { padding: 10px 12px; font-size: .95em;}
      h1#statusTitle { font-size: 1.2em;}
      .reset-error-details { font-size: .91em; padding: 8px 5px;}
    }
  </style>
  <script>
    // Glow BG Animation
    (() => {
      const canvas = document.getElementById('glow-bg');
      if(!canvas) return;
      let ctx, w, h, points = [];
      function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();
      ctx = canvas.getContext('2d');
      // Config for floating blobs
      function randomColor() {
        const palette = [
          [255, 215, 0, 0.16],  // gold
          [58,130,246, 0.10],   // blue
          [106,13,173, 0.13],   // purple
          [227,71,109, 0.13]    // pink
        ];
        return palette[Math.floor(Math.random()*palette.length)];
      }
      function createPoint() {
        const radius = 120 + Math.random()*160;
        return {
          x: Math.random() * w,
          y: Math.random() * h,
          r: radius,
          dx: (Math.random()-0.5)*0.6,
          dy: (Math.random()-0.5)*0.5,
          color: randomColor()
        }
      }
      for(let i=0;i<5;i++) points.push(createPoint());
      function animate() {
        ctx.clearRect(0,0,w,h);
        for(let p of points) {
          ctx.beginPath();
          ctx.arc(p.x,p.y,p.r,0,2*Math.PI);
          ctx.fillStyle = `rgba(${p.color[0]},${p.color[1]},${p.color[2]},${p.color[3]})`;
          ctx.shadowColor = `rgba(${p.color[0]},${p.color[1]},${p.color[2]},0.5)`;
          ctx.shadowBlur = 45;
          ctx.fill();
          p.x += p.dx; p.y += p.dy;
          if(p.x< -p.r) p.x=w+p.r;
          if(p.x>w+p.r) p.x=-p.r;
          if(p.y< -p.r) p.y=h+p.r;
          if(p.y>h+p.r) p.y=-p.r;
        }
        requestAnimationFrame(animate);
      }
      animate();
    })();

    // Animated Card Border Pulse on show
    setTimeout(() => {
      document.getElementById('mainCard')?.classList.add('glow-pop');
    }, 220);

    // Main Status/Verification Logic
    document.addEventListener('DOMContentLoaded', async () => {
      const statusIcon = document.getElementById('statusIcon');
      const statusTitle = document.getElementById('statusTitle');
      const statusMessage = document.getElementById('statusMessage');
      const homeButton = document.getElementById('homeButton');
      const errorDetailsDiv = document.getElementById('errorDetails');
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');
      const verificationMessage = urlParams.get('message');
      function setIcon(type, html) {
        statusIcon.className = 'reset-icon ' + type;
        statusIcon.innerHTML = html;
      }
      if (verificationMessage) {
        setIcon('error', '<i class="fas fa-times-circle"></i>');
        statusTitle.textContent = 'Verification Failed!';
        statusMessage.textContent = decodeURIComponent(verificationMessage);
        homeButton.style.display = 'inline-block';
        return;
      }
      const BASE_API_URL = window.location.origin;
      const VERIFY_EMAIL_API_URL = `${BASE_API_URL}/api/auth/verify-email?token=${token}`;
      if (!token) {
        setIcon('error', '<i class="fas fa-times-circle"></i>');
        statusTitle.textContent = 'Verification Failed!';
        statusMessage.textContent = 'No verification token found in the URL. Please ensure you clicked the correct link from your email.';
        homeButton.style.display = 'inline-block';
        return;
      }
      try {
        const response = await fetch(VERIFY_EMAIL_API_URL, { method: 'GET' });
        if (!response.ok) {
          const errorData = await response.json();
          setIcon('error', '<i class="fas fa-times-circle"></i>');
          statusTitle.textContent = 'Verification Failed!';
          statusMessage.textContent = errorData.message || 'There was an issue verifying your email. The link might be invalid or expired.';
          errorDetailsDiv.textContent = `Error: ${response.status} - ${errorData.message || 'Unknown error'}`;
          errorDetailsDiv.style.display = 'block';
        } else {
          setIcon('success', '<i class="fas fa-check-circle"></i>');
          statusTitle.textContent = 'Email Verified Successfully!';
          statusMessage.textContent = 'Your email address has been successfully verified. Redirecting to Feedback Portal...';
          setTimeout(() => {
            window.location.href = 'index.html?verification=success';
          }, 2900);
        }
      } catch (error) {
        setIcon('error', '<i class="fas fa-times-circle"></i>');
        statusTitle.textContent = 'Network Error!';
        statusMessage.textContent = 'Could not connect to the server to verify your email. Please check your internet connection or try again later.';
        errorDetailsDiv.textContent = `Details: ${error.message}`;
        errorDetailsDiv.style.display = 'block';
        console.error("Fetch error during email verification:", error);
      } finally {
        homeButton.style.display = 'inline-block';
      }
    });
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</body>
  
</body>
