<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Nobita Feedback Portal</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --deep-glass: rgba(25,22,51,0.83);
      --card-glass: rgba(52,40,80,0.92);
      --glass-blur: blur(16px);
      --brand-glow: #6a0dad;
      --brand-accent: #FFD700;
      --brand-pink: #e3476d;
      --brand-blue: #3B82F6;
      --brand-success: #3FE698;
      --brand-shadow: 0 8px 44px #381856cc, 0 4px 12px #0006;
      --brand-radius: 2.3em;
      --popup-radius: 1.4em;
      --error-bg: rgba(243, 30, 86, 0.13);
      --error-border: #f40a4f;
      --error-text: #f40a4f;
      --success-bg: rgba(63, 230, 152, 0.11);
      --success-border: #22d487;
      --success-text: #22d487;
    }
    body {
      font-family: 'Outfit', 'Poppins', sans-serif;
      background: linear-gradient(110deg, #3b1d60 0%, #432671 50%, #20253b 100%);
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
      color: #fff;
      text-align: center;
    }
    .fancy-navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 30px 10px 22px;
      background: rgba(27, 14, 44, 0.97);
      border-radius: 0 0 2.4em 2.4em;
      box-shadow: 0 2px 18px 1px #0008;
      gap: 10px;
      animation: navdrop .9s cubic-bezier(.16,2,.51,.99) .1s backwards;
      position: sticky; top:0; z-index:12;
    }
    @keyframes navdrop {
      0% { transform: translateY(-60px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
    .fancy-logo {
      width: 48px; height: 48px; border-radius: 50%;
      border: 2.8px solid var(--brand-accent);
      box-shadow: 0 0 16px #FFD70060, 0 0 6px #fff2;
      background: #2c1746;
      object-fit: cover;
      animation: flickerGlow 2s infinite alternate;
    }
    @keyframes flickerGlow {
      0% { box-shadow: 0 0 9px #FFD70030;}
      100% { box-shadow: 0 0 22px #FFD700d0, 0 0 6px #fff3;}
    }
    .fancy-title {
      flex: 1;
      text-align: center;
      font-size: 1.46em;
      color: var(--brand-accent);
      font-weight: 800;
      letter-spacing: .10em;
      text-shadow: 0 3px 16px #ffd70033, 0 1px 8px #0007;
      user-select: none;
    }
    .fancy-login-ic {
      font-size: 2.1em;
      color: var(--brand-blue);
      background: #fff2;
      border-radius: 50%;
      padding: 7px 10px;
      box-shadow: 0 1px 8px #0002;
      cursor: pointer;
      transition: background .18s, color .18s, box-shadow .18s;
      animation: fadeInIcon 1.2s;
    }
    .fancy-login-ic:hover {
      background: var(--brand-accent);
      color: #3b1d60;
      box-shadow: 0 2px 14px #FFD70090;
    }
    .glass-card {
      margin: 65px auto 0 auto;
      background: var(--card-glass);
      border-radius: var(--brand-radius);
      box-shadow: var(--brand-shadow);
      border: 2.5px solid transparent;
      max-width: 410px;
      width: 94%;
      padding: 48px 24px 36px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 10;
      backdrop-filter: var(--glass-blur);
      animation: popGlass .93s cubic-bezier(.32,1.42,.58,.97) .2s both;
      overflow: hidden;
    }
    @keyframes popGlass {
      0% { opacity:0; transform:scale(.87);}
      100% {opacity:1; transform:scale(1);}
    }
    .status-ic {
      font-size: 3.8em;
      margin-bottom: 17px;
      color: var(--brand-accent);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 1.2em;
      filter: drop-shadow(0 2px 6px #ffd70070);
      transition: color .23s;
    }
    .status-ic.success {
      color: var(--brand-success);
      animation: glowCheck 1.15s cubic-bezier(.7,2.2,.45,1) 1;
      filter: drop-shadow(0 0 8px #22eea3) brightness(1.08);
    }
    .status-ic.error {
      color: var(--error-text);
      animation: errorWobble .6s cubic-bezier(.7,.1,.2,1.3) 1;
      filter: drop-shadow(0 0 8px #f40a4f) brightness(1.14);
    }
    .status-ic.loading {
      color: var(--brand-blue);
      filter: drop-shadow(0 0 9px #3b82f6c2) brightness(1.03);
      animation: spin 1.3s linear infinite;
    }
    @keyframes glowCheck {
      0% { transform: scale(.9);}
      40% { transform: scale(1.23);}
      100% { transform: scale(1);}
    }
    @keyframes errorWobble {
      0% { transform: translateX(0);}
      10% { transform: translateX(-8px);}
      25% { transform: translateX(6px);}
      45% { transform: translateX(-4px);}
      60% { transform: translateX(3px);}
      100% { transform: translateX(0);}
    }
    @keyframes spin {
      0% { transform: rotate(0deg);}
      100% { transform: rotate(360deg);}
    }
    .pop-head {
      color: var(--brand-accent);
      font-size: 1.65em;
      margin-bottom: 11px;
      font-weight: 800;
      letter-spacing: .06em;
      text-shadow: 0 2px 16px #ffd70025,0 1px 2px #0005;
    }
    .pop-msg {
      font-size: 1.12em;
      line-height: 1.6;
      margin-bottom: 21px;
      color: #fffadc;
      font-weight: 400;
      text-shadow: 0 2px 8px #fff2;
    }
    .fancy-btn {
      background: linear-gradient(98deg, var(--brand-blue), var(--brand-accent), var(--brand-glow) 90%);
      color: #fff;
      padding: 13px 36px;
      border: none;
      border-radius: 14px;
      font-size: 1.09em;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.18s, transform 0.15s, color .13s;
      box-shadow: 0 2px 16px #3b82f670;
      margin-top: 11px;
      letter-spacing: 0.2px;
      position: relative;
      z-index: 2;
    }
    .fancy-btn:hover {
      background: linear-gradient(85deg, #FFD700, #3B82F6, #6a0dad 80%);
      color: #6a0dad;
      transform: translateY(-3px) scale(1.052);
      box-shadow: 0 8px 34px #3b82f680,0 0 28px #FFD70040;
    }
    .fancy-popup {
      margin: 0 auto 17px auto;
      border-radius: var(--popup-radius);
      box-shadow: 0 6px 32px #f40a4f44, 0 0 0 2px #fff2;
      padding: 20px 18px 11px 18px;
      max-width: 360px; width: 96%;
      background: var(--error-bg);
      color: var(--error-text);
      border: 1.9px solid var(--error-border);
      font-size: 1.13em;
      font-weight: 500;
      line-height: 1.5;
      animation: popGlass .38s cubic-bezier(.45,2.8,.41,1.01) both;
      word-break: break-word;
      text-align: left;
      transition: box-shadow .22s, border .19s;
    }
    .fancy-popup.success {
      background: var(--success-bg);
      color: var(--success-text);
      border-color: var(--success-border);
      box-shadow: 0 6px 34px #3fe69844;
    }
    /* FORM STYLES */
    .fancy-form {
      width: 100%; max-width: 335px;
      display: flex; flex-direction: column; gap: 18px;
      margin: 0 auto;
      animation: fadeInText 1s .23s both;
    }
    .fancy-label {
      text-align: left;
      font-size: 1em;
      margin-bottom: 2px;
      font-weight: 600;
      color: var(--brand-accent);
      letter-spacing: 0.1em;
    }
    .fancy-inp {
      padding: 13px 15px;
      border-radius: 9px;
      font-size: 1.11em;
      border: 2px solid #3b82f680;
      background: #251d39c0;
      color: #fff;
      outline: none;
      margin-bottom: 2px;
      box-shadow: 0 2px 10px #3b82f610;
      transition: border .13s, background .19s;
      font-family: inherit;
    }
    .fancy-inp:focus {
      border: 2px solid #FFD700;
      background: #2d295b;
    }
    @media (max-width: 520px) {
      .fancy-navbar { padding: 6px 7px; }
      .glass-card { padding: 23px 2vw 11px 2vw;}
      .fancy-title { font-size: 1em; }
      .fancy-logo, .fancy-login-ic { width: 33px; height: 33px; font-size: 1.2em; }
      .fancy-btn { padding: 9px 10px; font-size: .93em;}
      .pop-head { font-size: 1.17em;}
    }
  </style>
</head>
<body>
  <div class="fancy-navbar">
    <div>
      <img src="https://i.ibb.co/FsSs4SG/creator-avatar.png" class="fancy-logo" alt="Nobita" />
    </div>
    <div class="fancy-title">Nobita Feedback</div>
    <div>
      <div class="fancy-login-ic">
        <i class="fas fa-user-circle"></i>
      </div>
    </div>
  </div>
  <div class="glass-card" id="mainCard">
    <div id="statusIcon" class="status-ic loading"><i class="fas fa-spinner fa-spin"></i></div>
    <h1 class="pop-head" id="statusTitle">Reset Your Password</h1>
    <p class="pop-msg" id="statusMessage">Enter your new password below to reset your account password.</p>
    <form class="fancy-form" id="resetForm" style="display:block;">
      <label for="password" class="fancy-label">New Password</label>
      <input type="password" id="password" class="fancy-inp" name="password" required autocomplete="new-password" minlength="6" />
      <label for="confirmPassword" class="fancy-label">Confirm New Password</label>
      <input type="password" id="confirmPassword" class="fancy-inp" name="confirmPassword" required autocomplete="new-password" minlength="6" />
      <button type="submit" class="fancy-btn">Reset Password</button>
    </form>
    <div id="errorDetails" class="fancy-popup" style="display: none;"></div>
    <a href="index.html" id="homeButton" class="fancy-btn" style="display: none; margin-top:19px;">Go to Feedback Portal</a>
  </div>
  <script>
    // ICON/STATUS SETTER
    function setStatus(type, text, msg) {
      const statusIcon = document.getElementById('statusIcon');
      const statusTitle = document.getElementById('statusTitle');
      const statusMessage = document.getElementById('statusMessage');
      statusIcon.className = 'status-ic ' + type;
      if(type==='success') statusIcon.innerHTML='<i class="fas fa-check-circle"></i>';
      else if(type==='error') statusIcon.innerHTML='<i class="fas fa-times-circle"></i>';
      else statusIcon.innerHTML='<i class="fas fa-spinner fa-spin"></i>';
      statusTitle.textContent = text;
      statusMessage.textContent = msg;
    }
    // RESET PASSWORD FORM LOGIC
    document.getElementById('resetForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const password = document.getElementById('password').value.trim();
      const confirmPassword = document.getElementById('confirmPassword').value.trim();
      const errorDetailsDiv = document.getElementById('errorDetails');
      errorDetailsDiv.style.display = "none";
      errorDetailsDiv.className = "fancy-popup";
      if(password.length < 6){
        setStatus('error','Password Too Short','Password must be at least 6 characters.');
        errorDetailsDiv.textContent = "Password must be at least 6 characters.";
        errorDetailsDiv.style.display = "block";
        return;
      }
      if(password !== confirmPassword){
        setStatus('error','Password Mismatch','Passwords do not match.');
        errorDetailsDiv.textContent = "Both passwords must match!";
        errorDetailsDiv.style.display = "block";
        return;
      }
      setStatus('loading','Resetting Password...','Please wait while we update your password.');
      errorDetailsDiv.style.display = "none";
      // GET TOKEN FROM URL
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');
      if(!token){
        setStatus('error','Invalid or Expired Link','No reset token found. Please use the link sent to your email.');
        errorDetailsDiv.textContent = "No reset token found in URL.";
        errorDetailsDiv.style.display = "block";
        return;
      }
      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({token, password})
        });
        const data = await res.json();
        if(res.ok){
          setStatus('success','Password Reset!','Your password has been reset successfully. Redirecting to login...');
          errorDetailsDiv.className = "fancy-popup success";
          errorDetailsDiv.textContent = "Password reset successful!";
          errorDetailsDiv.style.display = "block";
          document.getElementById('resetForm').style.display = "none";
          setTimeout(()=>{
            window.location.href = "index.html?reset=success";
          },2200);
        } else {
          setStatus('error','Reset Failed', data.message || "Unable to reset password.");
          errorDetailsDiv.textContent = data.message || "Something went wrong. Try again!";
          errorDetailsDiv.style.display = "block";
        }
      } catch (err) {
        setStatus('error','Network Error','Could not connect to the server. Try again later.');
        errorDetailsDiv.textContent = err.message;
        errorDetailsDiv.style.display = "block";
      }
    });
  </script>
</body>
</html>
