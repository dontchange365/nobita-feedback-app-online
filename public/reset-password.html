<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Karein - Nobita Feedback</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Luckiest+Guy&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #7c3aed;
            --secondary: #FFD700;
            --accent: #22d3ee;
            --danger: #f43f5e;
            --success: #16e285;
            --text-light: #f9fafb;
            --glass: rgba(36,22,60,0.96);
            --card-border: #b097f7;
            --input-bg: rgba(255,255,255,0.07);
            --shadow-main: 0 6px 36px 0 #24072da9, 0 1.5px 8px #0008;
        }
        html, body {
            min-height: 100vh; margin: 0; padding: 0; box-sizing: border-box;
            background: linear-gradient(124deg, #1d163b 0%, #5e32ac 100%);
            font-family: 'Poppins', sans-serif;
            color: var(--text-light);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .mobile-bg-glow {
            position: fixed; z-index: 0; inset: 0;
            pointer-events: none;
        }
        .reset-password-container {
            position: relative;
            background: var(--glass);
            border-radius: 2.3em;
            box-shadow: var(--shadow-main);
            padding: 34px 16px 28px 16px;
            width: 98vw; max-width: 410px;
            text-align: center;
            margin: 20px 0 0 0;
            border: 2.5px solid transparent;
            animation: cardDropIn .9s cubic-bezier(.28,1.62,.44,1) .12s backwards;
            z-index: 3;
        }
        @keyframes cardDropIn {
            0% { opacity: 0; transform: translateY(-40px) scale(.86);}
            60% { opacity:.82; transform:translateY(12px) scale(1.05);}
            100% { opacity: 1; transform:translateY(0) scale(1);}
        }
        .reset-password-container h2 {
            color: var(--secondary);
            font-family: 'Luckiest Guy', cursive;
            font-size: 2.1em;
            margin-bottom: 17px;
            text-shadow: 0 0 12px #ffd70050, 0 1px 10px #fff2;
            animation: titlePop .73s cubic-bezier(.28,1.62,.44,1) .17s backwards;
        }
        @keyframes titlePop {
            0% { opacity:0; transform:scale(.8);}
            70% { opacity:1; transform:scale(1.13);}
            100% { opacity:1; transform:scale(1);}
        }
        .input-group {
            margin-bottom: 17px; text-align: left;
            animation: fadeUp .8s cubic-bezier(.42,1.3,.46,1) .24s backwards;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--secondary);
            font-weight: 600;
            font-size: .98em;
            letter-spacing: .03em;
            text-shadow: 0 1px 8px #ffd70040;
        }
        .input-group input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 11px;
            background: var(--input-bg);
            color: #fff;
            font-size: 1.08em;
            outline: none;
            border: 1.8px solid #c1a5ff30;
            box-shadow: 0 1.5px 7px #6a0dad20;
            font-family: inherit;
            transition: border .22s, background .18s;
            position: relative;
        }
        .input-group input:focus {
            border: 1.8px solid var(--accent);
            background: #221345a6;
        }
        .action-button {
            width: 100%;
            background: linear-gradient(92deg,var(--accent),var(--primary),var(--secondary) 95%);
            color: #fff;
            padding: 15px 0;
            border: none;
            border-radius: 12px;
            font-size: 1.09em;
            font-weight: 700;
            cursor: pointer;
            margin-top: 3px;
            box-shadow: 0 3px 18px #7c3aed40;
            letter-spacing: 0.05em;
            position: relative;
            z-index: 2;
            overflow: hidden;
            transition: background .19s, color .14s, transform .12s;
        }
        .action-button:after {
            content: '';
            position: absolute; left: 50%; top: 50%;
            width: 0; height: 0; border-radius: 50%;
            background: rgba(255,255,255,0.13);
            transform: translate(-50%, -50%);
            transition: width .33s, height .33s;
            z-index: 1;
            pointer-events: none;
        }
        .action-button:active:after {
            width: 260px; height: 260px;
            transition: width .12s, height .12s;
        }
        .action-button:disabled {
            background: #555; cursor: not-allowed; opacity: 0.64;
        }
        .action-button:not(:disabled):hover {
            background: linear-gradient(85deg,#FFD700,#22d3ee,#7c3aed 85%);
            color: #7c3aed;
            transform: scale(1.03);
            box-shadow: 0 8px 22px #22d3ee99,0 0 18px #FFD70050;
        }
        .spinner {
            border: 5px solid rgba(255,255,255,0.16);
            border-radius: 50%;
            border-top: 5px solid var(--secondary);
            width: 38px; height: 38px;
            margin: 22px auto 10px auto;
            animation: spin 0.7s linear infinite;
            display: none;
            box-shadow: 0 2px 10px #ffd70040;
        }
        @keyframes spin { 0% { transform: rotate(0deg);} 100% { transform: rotate(360deg);} }
        .message-area {
            margin-top: 12px;
            padding: 14px 13px;
            border-radius: 13px;
            display: none;
            font-size: 1.01em;
            box-shadow: 0 1.5px 8px #00000020;
            font-weight: 600;
            animation: fadeUp .65s cubic-bezier(.51,1.3,.36,1) backwards;
            line-height: 1.65;
        }
        @keyframes fadeUp {
            0% {opacity: 0; transform: translateY(20px);}
            100% {opacity: 1; transform: translateY(0);}
        }
        .message-area.success {
            background: linear-gradient(95deg,#eaffee,#b9ffdc 80%);
            color: var(--success); border: 2px solid var(--success);
            animation: popGlow 0.45s cubic-bezier(.22,2,.41,1.01) backwards;
            box-shadow: 0 3px 18px #16e28535;
        }
        .message-area.error {
            background: linear-gradient(100deg,#fff0f6 50%,#ffdbe9 100%);
            color: var(--danger); border: 2px solid var(--danger);
            animation: shakeX .48s cubic-bezier(.65,1.8,.45,1.11) backwards;
            box-shadow: 0 3px 18px #f43f5e44;
        }
        @keyframes popGlow {
            0% { opacity: 0; transform: scale(.9);}
            80% { opacity: 1; transform: scale(1.07);}
            100% { opacity: 1; transform: scale(1);}
        }
        @keyframes shakeX {
            0% { transform: translateX(0);}
            14% { transform: translateX(-11px);}
            32% { transform: translateX(9px);}
            55% { transform: translateX(-7px);}
            75% { transform: translateX(5px);}
            100% { transform: translateX(0);}
        }
        .home-link {
            display: none;
            margin-top: 17px;
            color: var(--secondary);
            font-size: 1.03em;
            font-weight: 600;
            text-decoration: none;
            letter-spacing: .03em;
            transition: color .17s;
            animation: fadeUp .9s 1.1s both;
        }
        .home-link:hover { color: var(--primary); text-decoration: underline;}
        /* Neon glow edge on card */
        .reset-password-container:before {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 2.5em;
            z-index: 1;
            pointer-events: none;
            background: linear-gradient(93deg,#FFD700 10%,#22d3ee 60%,#7c3aed 100%);
            opacity: .16;
            filter: blur(16px);
            transition: opacity .26s;
            animation: edgePulse 2.6s infinite alternate;
        }
        @keyframes edgePulse {
            0% { opacity: .13;}
            100% { opacity: .26;}
        }
        /* Responsive max mobile love */
        @media (max-width: 430px) {
            .reset-password-container {padding: 15vw 3vw 13vw 3vw; border-radius: 2.1em;}
            .input-group input {font-size:1em;}
            .action-button {font-size:.97em;}
        }
        @media (max-width: 340px) {
            .reset-password-container {padding: 3vw 1vw;}
        }
    </style>
</head>
<body>
<canvas class="mobile-bg-glow"></canvas>
<div class="reset-password-container">
    <h2>Naya Password Set Karein</h2>
    <form id="reset-password-form" autocomplete="off">
        <div class="input-group">
            <label for="new-password">Naya Password (min. 6 characters):</label>
            <input type="password" id="new-password" required minlength="6" autocomplete="new-password">
        </div>
        <div class="input-group">
            <label for="confirm-password">Naya Password Dobara Daalein:</label>
            <input type="password" id="confirm-password" required minlength="6" autocomplete="new-password">
        </div>
        <button type="submit" class="action-button" id="reset-submit-btn">
            <span><i class="fa fa-lock"></i> Password Reset Karein</span>
        </button>
        <div class="spinner" id="loading-spinner"></div>
    </form>
    <div id="response-message" class="message-area"></div>
    <a href="/" class="home-link" id="login-page-link">Login Page Par Wapas Jaayein</a>
</div>
<script>
/* BG Glow Neon Canvas (MOBILE + DESKTOP) */
(function(){
    const canvas = document.querySelector('.mobile-bg-glow');
    if(!canvas) return;
    function resize() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize); resize();
    const ctx = canvas.getContext('2d');
    const colors = [
        [255,215,0,.11],    // Gold
        [34,211,238,.10],   // Cyan
        [124,58,237,.13],   // Purple
        [22,226,133,.12]    // Green
    ];
    let points = Array.from({length:5},()=>({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:90+Math.random()*90,
        dx:(Math.random()-.5)*.9,
        dy:(Math.random()-.5)*.9,
        color:colors[Math.floor(Math.random()*colors.length)]
    }));
    function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        points.forEach(p=>{
            ctx.beginPath();
            ctx.arc(p.x,p.y,p.r,0,2*Math.PI);
            ctx.fillStyle=`rgba(${p.color[0]},${p.color[1]},${p.color[2]},${p.color[3]})`;
            ctx.shadowColor = `rgba(${p.color[0]},${p.color[1]},${p.color[2]},0.35)`;
            ctx.shadowBlur = 42;
            ctx.fill();
            p.x+=p.dx;p.y+=p.dy;
            if(p.x<-p.r)p.x=canvas.width+p.r;if(p.x>canvas.width+p.r)p.x=-p.r;
            if(p.y<-p.r)p.y=canvas.height+p.r;if(p.y>canvas.height+p.r)p.y=-p.r;
        });
        requestAnimationFrame(draw);
    }
    draw();
})();

/* Ultimate Animation + Ripple on Button + All JS Functions Original jaisa */
document.addEventListener('DOMContentLoaded', () => {
    const resetPasswordForm = document.getElementById('reset-password-form');
    const newPasswordInput = document.getElementById('new-password');
    const confirmPasswordInput = document.getElementById('confirm-password');
    const responseMessageDiv = document.getElementById('response-message');
    const loadingSpinner = document.getElementById('loading-spinner');
    const resetSubmitBtn = document.getElementById('reset-submit-btn');
    const loginPageLink = document.getElementById('login-page-link');
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    // BUTTON RIPPLE
    resetSubmitBtn.addEventListener('click', function(e){
        const btn = this;
        let ripple = btn.querySelector('.ripple-anim');
        if(ripple) ripple.remove();
        ripple = document.createElement('span');
        ripple.className = 'ripple-anim';
        ripple.style.position = 'absolute';
        ripple.style.zIndex = 2;
        ripple.style.background = 'rgba(255,255,255,.14)';
        ripple.style.borderRadius = '50%';
        ripple.style.pointerEvents = 'none';
        ripple.style.left = (e.offsetX - 70) + 'px';
        ripple.style.top = (e.offsetY - 70) + 'px';
        ripple.style.width = ripple.style.height = '140px';
        ripple.style.opacity = 1;
        ripple.animate([
            {opacity:1,transform:"scale(.2)"},
            {opacity:.47,transform:"scale(1.16)"},
            {opacity:0,transform:"scale(1.7)"}
        ],{duration:600,easing:"cubic-bezier(.45,2.4,.46,1.01)"});
        setTimeout(()=>{ if(ripple) ripple.remove(); },580);
        btn.appendChild(ripple);
    });

    if (!token) {
        showMessage('error', 'Password reset link anuchit hai ya token nahi mila. Kripya sahi link ka istemal karein ya naya reset request karein.');
        resetSubmitBtn.disabled = true;
        resetSubmitBtn.innerHTML = '<i class="fa fa-ban"></i> Anuchit Link';
        loginPageLink.style.display = 'inline-block';
        return;
    }

    resetPasswordForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const newPassword = newPasswordInput.value;
        const confirmPassword = confirmPasswordInput.value;
        if (!newPassword || !confirmPassword) {
            showMessage('error', 'Dono password fields bharna zaroori hai.');
            return;
        }
        if (newPassword !== confirmPassword) {
            showMessage('error', 'Passwords match nahi ho rahe.');
            confirmPasswordInput.focus();
            return;
        }
        if (newPassword.length < 6) {
            showMessage('error', 'Password kam se kam 6 characters ka hona chahiye.');
            newPasswordInput.focus();
            return;
        }
        loadingSpinner.style.display = 'block';
        resetSubmitBtn.disabled = true;
        resetSubmitBtn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Processing...';
        responseMessageDiv.style.display = 'none';

        try {
            const response = await fetch(`/api/auth/reset-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: token, password: newPassword, confirmPassword: confirmPassword })
            });
            const data = await response.json();
            if (response.ok) {
                showMessage('success', data.message + " <br>Redirect ho rahe hain...");
                resetPasswordForm.style.display = 'none';
                loginPageLink.style.display = 'inline-block';
                setTimeout(() => {
                    window.location.href = '/';
                }, 3500);
            } else {
                showMessage('error', data.message || 'Password reset karne mein samasya aa gayi.');
resetSubmitBtn.disabled = false;
resetSubmitBtn.innerHTML = '<i class="fa fa-lock"></i> Password Reset Karein';
}
} catch (error) {
    console.error('Reset password request error:', error);
    showMessage('error', 'Network ya server error. Kripya baad mein try karein.');
    resetSubmitBtn.disabled = false;
    resetSubmitBtn.innerHTML = '<i class="fa fa-lock"></i> Password Reset Karein';
} finally {
    loadingSpinner.style.display = 'none';
}
});

function showMessage(type, message) {
    responseMessageDiv.innerHTML = message;
    responseMessageDiv.className = `message-area ${type}`;
    responseMessageDiv.style.display = 'block';

    // Animation: scroll to message
    setTimeout(() => {
        responseMessageDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 130);

    // Vibration (if supported, mobile)
    if (window.navigator && window.navigator.vibrate) {
        if(type==='error') window.navigator.vibrate([100, 50, 90]);
        else window.navigator.vibrate(45);
    }
}
});
</script>
</body>
</html>
