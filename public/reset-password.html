<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verification - Nobita's Feedback Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
:root {
    --primary-color: #7c3aed;
    --secondary-color: #FFD700;
    --accent-color: #22d3ee;
    --danger-color: #f43f5e;
    --success-color: #16e285;
    --text-light: #f9fafb;
    --card-bg: rgba(30,24,54,0.92);
    --card-blur: blur(13px);
    --shadow-deep: 0 8px 36px 0 #24072d99, 0 1.5px 8px #0008;
}
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(125deg, #120731 0%, #432671 55%, #20253b 100%);
    min-height: 100vh;
    margin: 0;
    color: var(--text-light);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0;
    box-sizing: border-box;
    overflow-x: hidden;
    animation: bgFade 2.2s;
}
@keyframes bgFade {
    0% { filter: blur(6px) brightness(.7);}
    100% { filter: blur(0) brightness(1);}
}
.container {
    background: var(--card-bg);
    border-radius: 2.2em;
    padding: 44px 30px 36px 30px;
    max-width: 410px;
    width: 98%;
    box-shadow: var(--shadow-deep);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    backdrop-filter: var(--card-blur);
    border: 2px solid transparent;
    position: relative;
    margin-top: 35px;
    animation: popin .83s cubic-bezier(.22,1.52,.52,.99) .15s both;
    overflow: hidden;
}
@keyframes popin {
    0% {opacity:0; transform: scale(.88);}
    100% {opacity:1; transform: scale(1);}
}
.icon {
    font-size: 4.3em;
    margin-bottom: 18px;
    margin-top: -12px;
    filter: drop-shadow(0 0 20px #FFD70022);
    transition: color .23s;
}
.icon.success {
    color: var(--success-color);
    animation: boomIn .8s cubic-bezier(.4,2,.5,1) 1;
    filter: drop-shadow(0 0 10px #00ff8b80) brightness(1.12);
}
.icon.error {
    color: var(--danger-color);
    animation: shakeX .46s cubic-bezier(.7,.1,.2,1.2) 1;
    filter: drop-shadow(0 0 12px #f43f5e99) brightness(1.2);
}
.icon.loading {
    color: var(--secondary-color);
    animation: spin 1.5s linear infinite;
}
@keyframes boomIn {
    0% { transform: scale(.75);}
    65% { transform: scale(1.23);}
    100% {transform: scale(1);}
}
@keyframes shakeX {
    0% { transform: translateX(0);}
    14% { transform: translateX(-12px);}
    32% { transform: translateX(8px);}
    55% { transform: translateX(-6px);}
    75% { transform: translateX(4px);}
    100% { transform: translateX(0);}
}
@keyframes spin {
    0% { transform: rotate(0deg);}
    100% { transform: rotate(360deg);}
}
h1 {
    color: var(--secondary-color);
    font-size: 2em;
    margin-bottom: 13px;
    font-weight: 800;
    letter-spacing: .05em;
    text-shadow: 0 1.5px 8px #FFD70055, 0 2px 16px #fff1;
}
p {
    font-size: 1.15em;
    line-height: 1.65;
    margin-bottom: 23px;
    color: #fff5c9;
    text-shadow: 0 2px 8px #fff1;
}
.button {
    background: linear-gradient(93deg, var(--accent-color), var(--primary-color), var(--secondary-color));
    color: #fff;
    padding: 13px 29px;
    border: none;
    border-radius: 11px;
    font-size: 1.09em;
    font-weight: 700;
    cursor: pointer;
    transition: background .21s, transform .12s, color .12s;
    text-decoration: none;
    display: inline-block;
    margin-top: 12px;
    box-shadow: 0 2px 16px #7c3aed50;
    letter-spacing: .2px;
    position: relative;
    z-index: 2;
}
.button:hover {
    background: linear-gradient(85deg, #FFD700, #22d3ee, #7c3aed 80%);
    color: #7c3aed;
    transform: translateY(-3px) scale(1.048);
    box-shadow: 0 6px 20px #22d3eea0, 0 0 30px #FFD70040;
}
.error-details {
    font-size: 1.08em;
    color: #ffb4c6;
    background: rgba(253,56,126,0.13);
    border: 1.7px solid #f43f5e;
    border-radius: 1.2em;
    padding: 13px 18px 10px 18px;
    margin-top: 19px;
    margin-bottom: 7px;
    box-shadow: 0 2px 10px #f43f5e55;
    word-break: break-all;
    text-align: left;
    width: 98%;
    max-width: 345px;
    animation: boomIn .48s;
    display: block;
    font-weight: 500;
    line-height: 1.5;
    letter-spacing: .02em;
}
@media (max-width: 520px) {
    .container { padding: 23px 7vw 17px 7vw;}
    h1 { font-size: 1.17em;}
    .icon { font-size: 2.3em;}
    .button { padding: 8px 7px; font-size: .97em;}
    .error-details { font-size: .95em; padding: 8px 5px;}
}
    </style>
</head>
<body>
    <div class="container">
        <div id="statusIcon" class="icon loading">
            <i class="fas fa-spinner fa-spin"></i>
        </div>
        <h1 id="statusTitle">Verifying your email...</h1>
        <p id="statusMessage">Please wait while we confirm your email address. This may take a moment.</p>
        <div id="errorDetails" class="error-details" style="display: none;"></div>
        <a href="index.html" id="homeButton" class="button" style="display: none;">Go to Feedback Portal</a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const statusIcon = document.getElementById('statusIcon');
            const statusTitle = document.getElementById('statusTitle');
            const statusMessage = document.getElementById('statusMessage');
            const homeButton = document.getElementById('homeButton');
            const errorDetailsDiv = document.getElementById('errorDetails');

            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const verificationMessage = urlParams.get('message'); // Check for a direct message from server redirect

            // If the server directly redirects with a message (e.g., error.html?message=...), display it.
            if (verificationMessage) {
                statusIcon.className = 'icon error';
                statusIcon.innerHTML = '<i class="fas fa-times-circle"></i>';
                statusTitle.textContent = 'Verification Failed!';
                statusMessage.textContent = decodeURIComponent(verificationMessage);
                homeButton.style.display = 'block';
                return; // Stop further execution as message is handled
            }

            // This part of the code will only be reached if the server didn't redirect directly
            // which usually implies a successful verification was already handled by the server
            // or an unexpected scenario where the client-side fetch would still be necessary.
            // Given the server now redirects on success, this is primarily for debugging/fallback.
            
            const BASE_API_URL = window.location.origin;
            const VERIFY_EMAIL_API_URL = `${BASE_API_URL}/api/auth/verify-email?token=${token}`; 

            if (!token) {
                statusIcon.className = 'icon error';
                statusIcon.innerHTML = '<i class="fas fa-times-circle"></i>';
                statusTitle.textContent = 'Verification Failed!';
                statusMessage.textContent = 'No verification token found in the URL. Please ensure you clicked the correct link from your email.';
                homeButton.style.display = 'block';
                return;
            }

            try {
                // This fetch is now primarily to catch errors if the server
                // doesn't redirect immediately due to some backend error before it attempts the redirect.
                const response = await fetch(VERIFY_EMAIL_API_URL, { method: 'GET' });

                if (!response.ok) {
                    const errorData = await response.json(); 
                    statusIcon.className = 'icon error';
                    statusIcon.innerHTML = '<i class="fas fa-times-circle"></i>';
                    statusTitle.textContent = 'Verification Failed!';
                    statusMessage.textContent = errorData.message || 'There was an issue verifying your email. The link might be invalid or expired.';
                    errorDetailsDiv.textContent = `Error: ${response.status} - ${errorData.message || 'Unknown error'}`;
                    errorDetailsDiv.style.display = 'block';
                } else {
                    // This block should ideally not be reached if the server redirects on success.
                    // It's a fallback in case the server sends a success JSON response without redirecting.
                    statusIcon.className = 'icon success';
                    statusIcon.innerHTML = '<i class="fas fa-check-circle"></i>';
                    statusTitle.textContent = 'Email Verified Successfully!';
                    statusMessage.textContent = 'Your email address has been successfully verified. Redirecting to Feedback Portal...';
                    setTimeout(() => {
                        window.location.href = 'index.html?verification=success';
                    }, 3000); 
                }

            } catch (error) {
                statusIcon.className = 'icon error';
                statusIcon.innerHTML = '<i class="fas fa-times-circle"></i>';
                statusTitle.textContent = 'Network Error!';
                statusMessage.textContent = 'Could not connect to the server to verify your email. Please check your internet connection or try again later.';
                errorDetailsDiv.textContent = `Details: ${error.message}`;
                errorDetailsDiv.style.display = 'block';
                console.error("Fetch error during email verification:", error);
            } finally {
                homeButton.style.display = 'block';
            }
        });
    // CARD ENTRY ANIMATION (POP + GLOW)
window.addEventListener("DOMContentLoaded", function () {
  const card = document.querySelector(".container");
  if (card) {
    card.style.boxShadow = "0 0 40px 5px #7c3aed77, 0 8px 36px #12073199";
    card.animate([
      { opacity: 0, transform: "scale(0.84)" },
      { opacity: 1, transform: "scale(1.08)" },
      { opacity: 1, transform: "scale(1)" }
    ], {
      duration: 750,
      easing: "cubic-bezier(.22,1.52,.52,.99)"
    });
    setTimeout(() => {
      card.style.boxShadow = "0 8px 36px #24072d99, 0 1.5px 8px #0008";
    }, 850);
  }
});

// ICON BOUNCE ON STATUS CHANGE
function bounceStatusIcon() {
  const iconDiv = document.getElementById("statusIcon");
  if (iconDiv) {
    iconDiv.animate([
      { transform: "scale(1) rotate(0deg)" },
      { transform: "scale(1.18) rotate(-10deg)" },
      { transform: "scale(0.92) rotate(8deg)" },
      { transform: "scale(1.05) rotate(-3deg)" },
      { transform: "scale(1) rotate(0deg)" }
    ], {
      duration: 620,
      easing: "cubic-bezier(.43,1.8,.47,1)"
    });
  }
}
// Call this function in your logic after statusIcon/status change:
let _oldSetIcon = null;
if (!window._iconAnimated) {
  _oldSetIcon = window.setStatusIcon || (() => {});
  window.setStatusIcon = function (...args) {
    _oldSetIcon.apply(this, args);
    setTimeout(bounceStatusIcon, 40);
  };
  window._iconAnimated = true;
}
// If you use setStatus function yourself, just call bounceStatusIcon() after you update icon.

// BUTTON PULSE ON HOVER
document.addEventListener("DOMContentLoaded", function () {
  const btn = document.querySelector(".button");
  if (btn) {
    btn.addEventListener("mouseenter", function () {
      btn.animate([
        { transform: "scale(1)" },
        { transform: "scale(1.07)" },
        { transform: "scale(1)" }
      ], {
        duration: 320,
        easing: "cubic-bezier(.41,1.7,.44,1)"
      });
    });
  }
});

// ERROR BOX SHAKE ON SHOW
const errorDiv = document.getElementById("errorDetails");
if (errorDiv) {
  const show = errorDiv.style.display !== "none";
  const observer = new MutationObserver(function () {
    if (errorDiv.style.display !== "none") {
      errorDiv.animate([
        { transform: "translateX(0)" },
        { transform: "translateX(-10px)" },
        { transform: "translateX(8px)" },
        { transform: "translateX(0)" }
      ], { duration: 400, easing: "cubic-bezier(.57,2,.28,1)" });
    }
  });
  observer.observe(errorDiv, { attributes: true, attributeFilter: ["style"] });
}
    </script>
</body>
</html>
