<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Nobita Feedback Portal</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-color: #6a0dad;
      --secondary-color: #FFD700;
      --accent-color: #3B82F6;
      --danger-color: #e3476d;
      --success-color: #24d282;
      --text-color-light: #f4f4f9;
      --bg-gradient-start: #1a1a2e;
      --bg-gradient-end: #16213e;
    }
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(120deg, var(--bg-gradient-start), var(--primary-color));
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
      color: var(--text-color-light);
      text-align: center;
    }
    #glow-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      width: 100vw;
      height: 100vh;
      background: transparent;
    }
    .reset-navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 28px 8px 24px;
      width: 100%;
      background: rgba(44,62,80,0.95);
      border-radius: 0 0 18px 18px;
      box-shadow: 0 2px 16px 1px #0008;
      position: sticky; top: 0; z-index: 11;
      gap: 12px;
      animation: slideDownNav 1s cubic-bezier(.35,2,.52,1) .2s backwards;
    }
    @keyframes slideDownNav {
      0% { transform: translateY(-80px); opacity:0; }
      100% { transform: translateY(0); opacity:1;}
    }
    .reset-nav-logo {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 2px solid var(--secondary-color);
      box-shadow: 0 0 16px #ffd700a0, 0 0 6px #fff2;
      background: #333;
      object-fit: cover;
      animation: pulseAvatar 2.3s infinite alternate;
    }
    @keyframes pulseAvatar {
      0% { box-shadow: 0 0 10px #ffd70090;}
      100% { box-shadow: 0 0 22px #ffd700e0, 0 0 6px #fff3;}
    }
    .reset-nav-title {
      flex: 1;
      text-align: center;
      font-size: 1.45em;
      color: var(--secondary-color);
      font-weight: 700;
      letter-spacing: .8px;
      text-shadow: 0 2px 14px #fff1,0 0 10px #ffd70044;
      transition: font-size .18s;
      filter: brightness(1.11);
      user-select: none;
    }
    .reset-login-icon {
      font-size: 2em;
      color: var(--accent-color);
      background: #fff2;
      border-radius: 50%;
      padding: 5px 7px;
      transition: background 0.18s, color .18s, box-shadow .18s;
      cursor: pointer;
      box-shadow: 0 1px 7px #0002;
      animation: fadeInIcon 1.5s;
    }
    .reset-login-icon:hover {
      background: var(--secondary-color);
      color: #371575;
      box-shadow: 0 2px 14px #FFD70070;
    }
    .reset-container {
      margin: 62px auto 0 auto;
      background: rgba(40, 40, 70, 0.97);
      border-radius: 28px;
      box-shadow: 0 8px 42px #000a, 0 0 0 4px #fff1;
      border: 2.5px solid #3b82f6cc;
      max-width: 440px;
      width: 94%;
      padding: 50px 25px 38px 25px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 5;
      animation: cardPopIn .9s cubic-bezier(.44,1.35,.54,.97) .2s backwards;
      overflow: hidden;
    }
    .animated-card {
      box-shadow: 0 0 20px 3px #3B82F6cc, 0 8px 38px #000a;
      border-image: linear-gradient(90deg,#FFD700,#3B82F6,#6a0dad,#e3476d) 1;
      border-width: 2.5px;
      border-style: solid;
      transition: box-shadow .22s,border-image .22s;
    }
    .animated-card:focus-within, .animated-card:hover {
      box-shadow: 0 0 44px 7px #FFD70066, 0 12px 36px #3b82f660;
      border-image: linear-gradient(90deg,#3B82F6,#FFD700,#e3476d,#6a0dad) 1;
    }
    @keyframes cardPopIn {
      0% { opacity:0; transform:scale(.85);}
      100% {opacity:1; transform:scale(1);}
    }
    .reset-icon {
      font-size: 4.3em;
      margin-bottom: 20px;
      color: var(--secondary-color);
      display: flex; align-items: center; justify-content: center;
      min-height: 1.3em;
      filter: drop-shadow(0 2px 6px #ffd70050);
      transition: color .25s;
    }
    .reset-icon.success {
      color: var(--success-color);
      animation: bounceIcon 1.1s cubic-bezier(.6,2.2,.45,1) 1;
      filter: drop-shadow(0 0 8px #22eea3) brightness(1.08);
    }
    .reset-icon.error {
      color: var(--danger-color);
      animation: shakeIcon .6s cubic-bezier(.7,.1,.2,1.3) 1;
      filter: drop-shadow(0 0 8px #ff3c68) brightness(1.15);
    }
    .reset-icon.loading {
      color: var(--accent-color);
      filter: drop-shadow(0 0 10px #3b82f6) brightness(1.03);
    }
    .animate-bounce { animation: bounceIcon 1.2s infinite alternate; }
    @keyframes bounceIcon {
      0% { transform: translateY(0);}
      60% { transform: translateY(-10px) scale(1.07);}
      100% { transform: translateY(0);}
    }
    @keyframes shakeIcon {
      0% { transform: translateX(0);}
      10% { transform: translateX(-8px);}
      25% { transform: translateX(6px);}
      45% { transform: translateX(-4px);}
      60% { transform: translateX(3px);}
      100% { transform: translateX(0);}
    }
    h1#statusTitle {
      color: var(--secondary-color);
      font-size: 2.1em;
      margin-bottom: 16px;
      letter-spacing: .6px;
      font-weight: 800;
      text-shadow: 0 2px 16px #ffd70020,0 1px 2px #0005;
      animation: fadeInText .9s .4s both;
    }
    @keyframes fadeInText {
      0% { opacity: 0; transform: translateY(12px);}
      100% {opacity: 1; transform: translateY(0);}
    }
    p#statusMessage {
      font-size: 1.12em;
      line-height: 1.7;
      margin-bottom: 25px;
      color: #ffe987;
      animation: fadeInText 1s .6s both;
    }
    .reset-button {
      background: linear-gradient(92deg, var(--accent-color), var(--primary-color), var(--secondary-color));
      color: #fff;
      padding: 14px 36px;
      border: none;
      border-radius: 12px;
      font-size: 1.1em;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.28s, transform 0.14s, color .19s;
      text-decoration: none;
      box-shadow: 0 2px 16px #3b82f650;
      margin-top: 18px;
      letter-spacing: 0.6px;
      position: relative;
      z-index: 2;
      animation: fadeInText 1.2s 1s both;
    }
    .reset-button:hover {
      background: linear-gradient(85deg, #FFD700, #3B82F6, #6a0dad 80%);
      color: #6a0dad;
      transform: translateY(-3px) scale(1.048);
      box-shadow: 0 6px 32px #3b82f680,0 0 30px #FFD70040;
    }
    .reset-error-details {
      font-size: 1em;
      color: #f8d7da;
      background: #3b2231;
      border: 1.5px solid #e3476d55;
      border-radius: 10px;
      padding: 14px 18px;
      margin-top: 20px;
      margin-bottom: 7px;
      box-shadow: 0 1px 8px #e3476d88;
      word-break: break-all;
      text-align: left;
      width: 97%;
      max-width: 350px;
      animation: fadeIn 0.45s ease-out;
      display: block;
    }
    /* FORM */
    .reset-form {
      width: 100%; max-width: 370px;
      display: flex; flex-direction: column; gap: 17px;
      margin: 0 auto;
      animation: fadeInText 1s .23s both;
    }
    .reset-label {
      text-align: left;
      font-size: 1em;
      margin-bottom: 3px;
      font-weight: 500;
      color: var(--secondary-color);
      letter-spacing: 0.1em;
    }
    .reset-input {
      padding: 12px 16px;
      border-radius: 7px;
      font-size: 1.08em;
      border: 1.5px solid #3b82f670;
      background: #23224b;
      color: #fff;
      outline: none;
      margin-bottom: 2px;
      box-shadow: 0 2px 10px #3b82f610;
      transition: border .15s, background .19s;
    }
    .reset-input:focus {
      border: 1.5px solid #FFD700;
      background: #2d295b;
    }
    @media (max-width: 500px) {
      .reset-navbar { padding: 7px 7px; }
      .reset-container { padding: 25px 3vw 19px 3vw;}
      .reset-nav-title { font-size: 1em; }
      .reset-nav-logo, .reset-login-icon { width: 32px; height: 32px; font-size: 1.2em; }
      .reset-button { padding: 10px 12px; font-size: .95em;}
      h1#statusTitle { font-size: 1.2em;}
      .reset-error-details { font-size: .91em; padding: 8px 5px;}
    }
  </style>
</head>
<body>
  <div class="reset-navbar">
    <div class="reset-nav-left">
      <img src="https://i.ibb.co/FsSs4SG/creator-avatar.png" class="reset-nav-logo" alt="Nobita" />
    </div>
    <div class="reset-nav-title">Nobita Feedback</div>
    <div class="reset-nav-right">
      <div class="reset-login-icon">
        <i class="fas fa-user-circle"></i>
      </div>
    </div>
  </div>
  <canvas id="glow-bg"></canvas>
  <div class="reset-container animated-card" id="mainCard">
    <div id="statusIcon" class="reset-icon loading animate-bounce">
      <i class="fas fa-spinner fa-spin"></i>
    </div>
    <h1 id="statusTitle">Reset Your Password</h1>
    <p id="statusMessage">Enter your new password below to reset your account password.</p>
    <form class="reset-form" id="resetForm" style="display:block;">
      <label for="password" class="reset-label">New Password</label>
      <input type="password" id="password" class="reset-input" name="password" required autocomplete="new-password" minlength="6" />
      <label for="confirmPassword" class="reset-label">Confirm New Password</label>
      <input type="password" id="confirmPassword" class="reset-input" name="confirmPassword" required autocomplete="new-password" minlength="6" />
      <button type="submit" class="reset-button">Reset Password</button>
    </form>
    <div id="errorDetails" class="reset-error-details" style="display: none;"></div>
    <a href="index.html" id="homeButton" class="reset-button" style="display: none;">Go to Feedback Portal</a>
  </div>
  <script>
    // BG Animation (same as pro version)
    (() => {
      const canvas = document.getElementById('glow-bg');
      if(!canvas) return;
      let ctx, w, h, points = [];
      function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();
      ctx = canvas.getContext('2d');
      function randomColor() {
        const palette = [
          [255, 215, 0, 0.17],
          [58,130,246, 0.10],
          [106,13,173, 0.12],
          [227,71,109, 0.13]
        ];
        return palette[Math.floor(Math.random()*palette.length)];
      }
      function createPoint() {
        const radius = 120 + Math.random()*160;
        return {
          x: Math.random() * w,
          y: Math.random() * h,
          r: radius,
          dx: (Math.random()-0.5)*0.6,
          dy: (Math.random()-0.5)*0.5,
          color: randomColor()
        }
      }
      for(let i=0;i<5;i++) points.push(createPoint());
      function animate() {
        ctx.clearRect(0,0,w,h);
        for(let p of points) {
          ctx.beginPath();
          ctx.arc(p.x,p.y,p.r,0,2*Math.PI);
          ctx.fillStyle = `rgba(${p.color[0]},${p.color[1]},${p.color[2]},${p.color[3]})`;
          ctx.shadowColor = `rgba(${p.color[0]},${p.color[1]},${p.color[2]},0.5)`;
          ctx.shadowBlur = 45;
          ctx.fill();
          p.x += p.dx; p.y += p.dy;
          if(p.x< -p.r) p.x=w+p.r;
          if(p.x>w+p.r) p.x=-p.r;
          if(p.y< -p.r) p.y=h+p.r;
          if(p.y>h+p.r) p.y=-p.r;
        }
        requestAnimationFrame(animate);
      }
      animate();
    })();

    // Icon status & animated card
    function setStatus(type, text, msg) {
      const statusIcon = document.getElementById('statusIcon');
      const statusTitle = document.getElementById('statusTitle');
      const statusMessage = document.getElementById('statusMessage');
      statusIcon.className = 'reset-icon ' + type;
      if(type==='success') statusIcon.innerHTML='<i class="fas fa-check-circle"></i>';
      else if(type==='error') statusIcon.innerHTML='<i class="fas fa-times-circle"></i>';
      else statusIcon.innerHTML='<i class="fas fa-spinner fa-spin"></i>';
      statusTitle.textContent = text;
      statusMessage.textContent = msg;
    }

    // Reset Password Logic
    document.getElementById('resetForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const password = document.getElementById('password').value.trim();
      const confirmPassword = document.getElementById('confirmPassword').value.trim();
      const errorDetailsDiv = document.getElementById('errorDetails');
      errorDetailsDiv.style.display = "none";

      if(password.length < 6){
setStatus('error','Password Too Short','Password must be at least 6 characters.');
errorDetailsDiv.textContent = "Password must be at least 6 characters.";
errorDetailsDiv.style.display = "block";
return;
}
if(password !== confirmPassword){
  setStatus('error','Password Mismatch','Passwords do not match.');
  errorDetailsDiv.textContent = "Both passwords must match!";
  errorDetailsDiv.style.display = "block";
  return;
}

// Show loading spinner while sending request
setStatus('loading','Resetting Password...','Please wait while we update your password.');
errorDetailsDiv.style.display = "none";

// GET TOKEN FROM URL
const urlParams = new URLSearchParams(window.location.search);
const token = urlParams.get('token');
if(!token){
  setStatus('error','Invalid or Expired Link','No reset token found. Please use the link sent to your email.');
  errorDetailsDiv.textContent = "No reset token found in URL.";
  errorDetailsDiv.style.display = "block";
  return;
}

try {
  const res = await fetch('/api/auth/reset-password', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({token, password})
  });
  const data = await res.json();

  if(res.ok){
    setStatus('success','Password Reset!','Your password has been reset successfully. Redirecting to login...');
    errorDetailsDiv.style.display = "none";
    document.getElementById('resetForm').style.display = "none";
    setTimeout(()=>{
      window.location.href = "index.html?reset=success";
    },2500);
  } else {
    setStatus('error','Reset Failed', data.message || "Unable to reset password.");
    errorDetailsDiv.textContent = data.message || "Something went wrong. Try again!";
    errorDetailsDiv.style.display = "block";
  }
} catch (err) {
  setStatus('error','Network Error','Could not connect to the server. Try again later.');
  errorDetailsDiv.textContent = err.message;
  errorDetailsDiv.style.display = "block";
}
});
</script>
</body>
</html>
