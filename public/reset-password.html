<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - 𝙉𝙊𝘽𝙄 𝘽𝙊𝙏</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <header>
        <div class="logo">𝙉𝙊𝘽𝙄 𝘽𝙊𝙏</div>
        <nav>
            <button class="nav-toggle">☰</button>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/login.html">Login/Signup</a></li>
            </ul>
        </nav>
    </header>

    <main class="auth-container">
        <h2>Reset Password</h2>
        <form id="reset-password-form">
            <div class="form-group">
                <label for="newPassword">New Password:</label>
                <input type="password" id="newPassword" name="newPassword" required>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm New Password:</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required>
            </div>
            <input type="hidden" id="resetToken" name="resetToken" value="">
            <button type="submit" class="auth-button">Reset Password</button>
        </form>
        <div id="reset-password-message" class="mt-2" style="display: none;"></div>
    </main>

    <footer>
        <p>© 2025 Nobi Bot</p>
    </footer>

    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Get the token from the URL query parameters
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        if (token) {
            document.getElementById('resetToken').value = token;
        } else {
            // Handle case where token is missing or invalid in the URL
            document.getElementById('reset-password-form').innerHTML = '<p class="error-message">Invalid or missing reset token.</p>';
        }
    </script>
</body>
</html>
