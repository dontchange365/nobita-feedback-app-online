<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - 𝙉𝙊𝘽𝙄 𝘽𝙊𝙏</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/feedback.css">
</head>
<body>
    <header>
        <div class="logo">𝙉𝙊𝘽𝙄 𝘽𝙊𝙏</div>
        <nav>
            <button class="nav-toggle">☰</button>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li class="active"><a href="/feedback.html">Feedback</a></li>
                <li id="account-link" style="display: none;"><a href="/account.html">Account</a></li>
                <li id="login-signup-link" style="display: none;"><a href="/login.html">Login/Signup</a></li>
                <li id="admin-link" style="display: none;"><a href="/admin.html">Admin Panel</a></li>
                <li><a href="#" id="logout-link" style="display: none;">Logout</a></li>
            </ul>
        </nav>
    </header>

    <main class="feedback-container">
        <h2>Leave Feedback</h2>
        <form id="feedback-form">
            <div class="form-group">
                <label for="rating">Rating:</label>
                <select id="rating" name="rating" required>
                    <option value="">Select a rating</option>
                    <option value="1">★</option>
                    <option value="2">★★</option>
                    <option value="3">★★★</option>
                    <option value="4">★★★★</option>
                    <option value="5">★★★★★</option>
                </select>
            </div>
            <div class="form-group">
                <label for="comment">Feedback:</label>
                <textarea id="comment" name="comment" rows="5" required></textarea>
            </div>
            <div class="form-group">
                <label for="media">Media (Optional - Images/Videos):</label>
                <input type="file" id="media" name="media" multiple accept="image/*, video/*">
                <div id="media-preview"></div>
            </div>
            <button type="submit" class="submit-button">Submit Feedback</button>
        </form>

        <section id="existing-feedback">
            <h2>User Feedbacks</h2>
            <div id="feedback-list">
                </div>
        </section>
    </main>

    <footer>
        <p>© 2025 Nobi Bot</p>
    </footer>

    <script src="js/app.js"></script>
    <script src="js/feedback.js"></script>
</body>
</html>
