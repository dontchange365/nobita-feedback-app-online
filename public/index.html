<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Nobita Feedback Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="https://api.dicebear.com/8.x/adventurer/svg?seed=nobita&radius=50" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Lexend:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/intro.js/minified/introjs.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar" aria-label="Main">
    <div class="navbar-logo" id="nav-logo" tabindex="0" aria-label="Reload Home">
      <i data-lucide="zap"></i>
      <span>Nobita Feedback</span>
    </div>
    <div class="navbar-right">
      <button class="nav-icon-btn" id="theme-toggle" aria-label="Toggle dark/light mode"><i data-lucide="moon"></i></button>
      <button class="nav-icon-btn" id="lang-toggle" aria-label="Change Language"><i data-lucide="globe"></i></button>
      <button class="nav-icon-btn" id="notif-bell-btn" aria-label="Notifications"><i data-lucide="bell"></i><span id="notif-badge" class="notif-badge hidden">0</span></button>
      <button class="nav-icon-btn" id="user-btn" aria-label="Open login or profile menu"><i data-lucide="user"></i></button>
    </div>
    <div id="user-dropdown" class="dropdown-menu hidden" aria-label="User menu"></div>
    <div id="notif-dropdown" class="dropdown-menu hidden" aria-label="Notifications"></div>
  </nav>
  <div id="modal-root"></div>
  <div id="toast-container" aria-live="polite"></div>
  <section id="hero" class="glass-hero centered">
    <h1 class="hero-title" id="hero-greet">Welcome to Nobita Feedback!</h1>
    <div class="hero-greet" id="hero-desc">Share your thoughts, rate us, and help us grow better. ⭐</div>
    <div class="hero-btns">
      <button class="primary-btn" id="hero-feedback-btn"><i data-lucide="edit"></i>Give Feedback</button>
      <button class="secondary-btn" id="hero-tour-btn"><i data-lucide="help-circle"></i>Show me how</button>
    </div>
  </section>
  <section id="overall-rating-block" class="centered" style="margin-bottom:18px;">
    <div id="overall-rating-stars" style="font-size:2.5rem;display:flex;gap:8px;"></div>
    <div id="overall-rating-value" style="font-size:2.2rem;font-weight:700;margin-top:6px;"></div>
    <div id="overall-rating-count" style="font-size:1.08rem;color:#6b6b85;margin-top:3px;"></div>
  </section>
  <div style="display:flex;justify-content:center;margin-bottom:18px;">
    <input id="search-feedback" type="search" placeholder="Search feedback..." style="width:350px;max-width:98vw;padding:0.8em 2.6em 0.8em 2.3em;font-size:1.1rem;border-radius:17px;border:1.3px solid #d1d5db;background:rgba(255,255,255,0.16);box-shadow:0 1px 4px 0 rgba(120,120,180,0.09);color:#2b2d38;" aria-label="Search feedback" />
    <i data-lucide="search" style="position:relative;left:-36px;top:9px;color:#adb4d6;width:22px;height:22px;pointer-events:none;"></i>
  </div>
  <section id="feedback-panel" class="centered" style="margin-bottom: 42px;">
    <form id="feedback-form" class="glass" style="padding:2em 2em;max-width:780px;border-radius:21px;box-shadow:0 4px 32px 0 rgba(80,60,255,0.04);width:99vw;display:flex;flex-direction:column;gap:1.4em;">
      <div style="display:flex;align-items:center;gap:14px;">
        <span style="font-size:1.1rem;font-weight:500;margin-right:8px;">Your Rating:</span>
        <div id="feedback-stars" style="display:flex;gap:5px;"></div>
      </div>
      <div style="position:relative;">
        <textarea id="feedback-text" required minlength="2" rows="2" style="width:100%;min-height:52px;resize:none;padding:1.1em 1em;font-size:1.18rem;border-radius:11px;border:1.2px solid #d1d5db;background:rgba(255,255,255,0.16);outline:none;" aria-label="Feedback"></textarea>
        <label for="feedback-text" style="position:absolute;left:1.2em;top:.7em;color:#7b7b97;font-size:1.08rem;pointer-events:none;transition:.2s;opacity:.7;">Feedback (Markdown supported)</label>
      </div>
      <div style="display:flex;align-items:center;gap:17px;flex-wrap:wrap;">
        <button type="button" class="nav-icon-btn" id="attach-btn" aria-label="Attach file"><i data-lucide="paperclip"></i></button>
        <input type="file" id="attach-input" class="hidden" accept="image/*,.pdf,.doc,.docx,.txt,.xls,.xlsx,.ppt,.pptx" />
        <span id="attach-preview" style="font-size:1rem;color:#555;"></span>
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:1.05rem;margin-left:12px;">
          <input type="checkbox" id="anon-toggle" style="accent-color:#6366f1;margin-right:5px;" />
          <i data-lucide="user-x"></i> Post as anonymous
        </label>
        <div style="margin-left:auto;display:flex;gap:8px;">
          <button type="button" id="feedback-bold-btn" class="nav-icon-btn" title="Bold"><i data-lucide="bold"></i></button>
          <button type="button" id="feedback-italic-btn" class="nav-icon-btn" title="Italic"><i data-lucide="italic"></i></button>
          <button type="button" id="feedback-bullet-btn" class="nav-icon-btn" title="Bullet List"><i data-lucide="list"></i></button>
          <button type="button" id="feedback-emoji-btn" class="nav-icon-btn" title="Emoji"><i data-lucide="smile"></i></button>
          <button type="button" id="feedback-code-btn" class="nav-icon-btn" title="Code"><i data-lucide="code"></i></button>
        </div>
      </div>
      <button class="primary-btn" id="submit-feedback-btn" type="submit"><i data-lucide="send"></i>Submit Feedback</button>
    </form>
  </section>
  <section id="feedback-list" class="centered" style="max-width:780px;margin:0 auto 28px auto;width:99vw;display:flex;flex-direction:column;gap:23px;"></section>
  <div id="load-more-sentinel" style="height:38px;display:flex;align-items:center;justify-content:center;">
    <div class="loader" id="load-more-spinner" style="display:none;"></div>
  </div>
  <!-- Lucide, Marked, Intro.js, Socket.io, etc. -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://unpkg.com/intro.js/minified/intro.min.js"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
