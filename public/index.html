<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nobita Feedback Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Favicon: Nobita avatar -->
  <link rel="icon" href="https://api.dicebear.com/8.x/adventurer/svg?seed=nobita&radius=50" />

  <!-- Google Fonts: Inter, Lexend, Roboto -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Lexend:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">

  <!-- Lucide Icons CDN (Feather icons) -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

  <!-- Animate.css for pop/smooth animation (for modals, toasts) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

  <!-- Main App Styles -->
  <style>
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --success: #22c55e;
      --error: #ef4444;
      --warn: #f59e42;
      --glass: rgba(30,41,59,0.72);
      --glass-modal: rgba(30,41,59,0.86);
      --backdrop: rgba(30, 41, 59, 0.72);
      --gradient-main: linear-gradient(90deg, #eef2ff 0%, #f5d0fe 100%);
      --shadow-xl: 0 8px 32px 0 rgba(31,38,135,0.37);
      --border-radius: 18px;
      --border-radius-sm: 10px;
      --nav-height: 72px;
      --font-main: 'Inter', sans-serif;
      --font-title: 'Lexend', sans-serif;
      --font-code: 'Roboto Mono', monospace;
      --avatar-size: 42px;
      --z-nav: 20;
      --z-modal: 999;
      --z-toast: 2000;
      --blur: blur(8px);
      --blur-modal: blur(16px);
      --modal-width: 420px;
      --modal-padding: 36px;
    }

    body {
      font-family: var(--font-main);
      margin: 0;
      background: var(--gradient-main);
      min-height: 100vh;
      color: #21213c;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    /* Top NavBar */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-height);
      z-index: var(--z-nav);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 36px;
      background: var(--glass);
      box-shadow: var(--shadow-xl);
      backdrop-filter: blur(12px);
      border-bottom: 1.5px solid #d9d4fa44;
      transition: background 0.2s;
    }
    .navbar .nav-left, .navbar .nav-right {
      display: flex;
      align-items: center;
      gap: 24px;
      height: 100%;
    }
    .navbar-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: var(--font-title);
      font-size: 2.1rem;
      font-weight: 700;
      color: var(--primary-dark);
      letter-spacing: 2px;
      cursor: pointer;
      user-select: none;
      text-shadow: 0 4px 24px #b5b8fc60;
    }
    .navbar-logo svg {
      width: 36px; height: 36px;
      display: inline;
      vertical-align: middle;
    }
    .navbar .nav-right > .nav-btn {
      background: transparent;
      border: none;
      outline: none;
      cursor: pointer;
      padding: 0 8px;
      position: relative;
      transition: background 0.16s;
      display: flex;
      align-items: center;
      height: 44px;
      border-radius: 8px;
    }
    .navbar .nav-right > .nav-btn:active, .navbar .nav-right > .nav-btn:focus {
      background: #e7e9fc33;
    }
    .navbar .nav-right > .nav-avatar-btn {
      border-radius: 50%;
      overflow: visible;
      padding: 0;
      width: var(--avatar-size);
      height: var(--avatar-size);
      background: none;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #bcb8fd80;
      box-shadow: 0 2px 10px #c1bffd23;
      transition: box-shadow 0.22s;
      position: relative;
    }
    .nav-avatar-img {
      width: var(--avatar-size);
      height: var(--avatar-size);
      border-radius: 50%;
      object-fit: cover;
      transition: box-shadow 0.18s, border 0.18s;
      box-shadow: 0 4px 24px #d6d7f260;
      border: 2.5px solid #f5f3ff;
      background: #eceffe;
    }
    .avatar-badge {
      position: absolute;
      bottom: -2px; right: -2px;
      background: #6366f1;
      color: #fff;
      border-radius: 7px;
      padding: 2px 7px;
      font-size: 0.72em;
      font-weight: bold;
      border: 2px solid #fff;
      box-shadow: 0 2px 4px #a0a4ff36;
      z-index: 3;
      display: flex; align-items: center; gap: 3px;
      animation: badgeFadeIn 0.6s cubic-bezier(.62,.01,.22,1.03);
    }
    @keyframes badgeFadeIn {
      0% { opacity: 0; transform: scale(0.6);}
      80% { opacity: 1; transform: scale(1.1);}
      100% { opacity: 1; transform: scale(1);}
    }
    /* Notification bell badge */
    .bell-badge {
      position: absolute;
      top: 7px; right: 9px;
      background: #ef4444;
      color: #fff;
      font-size: 12px;
      min-width: 18px;
      min-height: 18px;
      padding: 2px 6px;
      border-radius: 8px;
      text-align: center;
      font-weight: bold;
      z-index: 2;
      border: 2px solid #fff;
      box-shadow: 0 1px 8px #d73c3e33;
      display: flex; align-items: center; justify-content: center;
      animation: badgeFadeIn 0.5s;
    }
    /* Theme toggle sun/moon */
    .theme-toggle-btn { font-size: 1.32rem; }

    /* Responsive NavBar */
    @media (max-width: 700px) {
      .navbar { padding: 0 10px; }
      .navbar-logo { font-size: 1.4rem; }
      .navbar .nav-right { gap: 12px; }
    }
    @media (max-width: 490px) {
      .navbar { height: 54px; min-height: 54px;}
      .navbar-logo { font-size: 1.05rem; }
      .nav-avatar-img { width: 34px; height: 34px;}
    }
    /* Main Content Padding */
    .main-app-content { padding-top: var(--nav-height);}
    @media (max-width: 700px) { .main-app-content { padding-top: 62px;} }
    @media (max-width: 490px) { .main-app-content { padding-top: 50px;} }

    /* === MODAL OVERLAY + Glassmorphic Login Modal === */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(30,41,59,0.62);
      backdrop-filter: blur(8px);
      z-index: var(--z-modal);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.26s;
      opacity: 1;
    }
    .modal-overlay.hide { opacity: 0; pointer-events: none;}
    .glass-modal {
      background: var(--glass-modal);
      border-radius: var(--border-radius);
      box-shadow: 0 6px 40px 0 rgba(71,35,196,0.17), 0 1.5px 12px 0 rgba(30,41,59,0.14);
      padding: var(--modal-padding);
      min-width: 90vw;
      max-width: var(--modal-width);
      min-height: 340px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 28px;
      position: relative;
      animation: scaleModalIn 0.36s cubic-bezier(.61,1.41,.52,.96);
      border: 2px solid #6867dd45;
      outline: none;
      font-family: var(--font-main);
    }
    @keyframes scaleModalIn {
      0% { opacity: 0; transform: scale(0.80);}
      85% { opacity: 1; transform: scale(1.07);}
      100% { opacity: 1; transform: scale(1);}
    }
    .glass-modal .modal-title {
      font-family: var(--font-title);
      font-size: 2.1rem;
      font-weight: 700;
      color: var(--primary-dark);
      margin-bottom: 0;
      text-align: center;
      letter-spacing: 2px;
      margin-top: 0;
    }
    /* Modal Close Button */
    .modal-close-btn {
      position: absolute;
      top: 16px; right: 20px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.6em;
      color: #fff;
      opacity: 0.72;
      z-index: 6;
      transition: color 0.12s;
      padding: 4px;
    }
    .modal-close-btn:hover { color: var(--error); }
    /* === Floating Label Input Styles === */
    .floating-label-group {
      position: relative;
      margin-bottom: 24px;
    }
    .floating-label-group input {
      width: 100%;
      border: none;
      border-bottom: 2px solid #dedafd;
      outline: none;
      font-size: 1.13rem;
      background: transparent;
      color: #f6f7fa;
      padding: 14px 0 8px 0;
      font-family: var(--font-main);
      border-radius: 0;
      transition: border-color 0.19s;
    }
    .floating-label-group input:focus {
      border-bottom: 2.5px solid var(--primary);
      background: none;
    }
    .floating-label-group label {
      color: #d8d6ff;
      position: absolute;
      left: 0;
      top: 15px;
      pointer-events: none;
      font-size: 1rem;
      font-weight: 400;
      transition: top 0.14s, font-size 0.14s, color 0.14s;
      background: none;
    }
    .floating-label-group input:focus ~ label,
    .floating-label-group input:not(:placeholder-shown) ~ label {
      top: -11px;
      font-size: 0.89rem;
      color: var(--primary);
      font-weight: 700;
      background: none;
    }
    /* Password Show/Hide Button */
    .input-password-toggle {
      position: absolute;
      right: 7px; top: 8px;
      background: transparent;
      border: none;
      cursor: pointer;
      color: #a3a4bc;
      font-size: 1.23em;
      z-index: 4;
      padding: 6px;
    }
    .input-password-toggle:active { color: var(--primary); }
    /* Google Sign-In Button */
    .google-signin-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border-radius: 25px;
      border: 2px solid #4285F4;
      background: #fff;
      font-weight: bold;
      color: #222;
      font-size: 1.05em;
      padding: 11px 32px 11px 19px;
      box-shadow: 0 2px 10px #a9a6f235;
      cursor: pointer;
      transition: box-shadow 0.18s, background 0.18s, color 0.16s;
      margin-top: 12px;
      user-select: none;
    }
    .google-signin-btn:hover {
      box-shadow: 0 6px 22px #849af435;
      background: #f7faff;
      color: #333;
    }
    .google-logo-svg {
      width: 23px; height: 23px; display: inline-block; vertical-align: middle;
    }
    /* Toast Notification */
    .toast-stack {
      position: fixed;
      top: 24px; right: 20px;
      z-index: var(--z-toast);
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .toast-msg {
      display: flex;
      align-items: center;
      gap: 13px;
      border-radius: 10px;
      font-size: 1.01em;
      font-weight: 600;
      padding: 13px 27px 13px 17px;
      box-shadow: 0 3px 16px #b7b1ff27;
      min-width: 260px;
      max-width: 380px;
      animation: fadeInRight 0.36s cubic-bezier(.71,.44,.26,1.12);
      color: #fff;
      border: 2px solid #fff2;
    }
    .toast-success { background: #23ca6b; }
    .toast-error   { background: #e33a4e; }
    .toast-warn    { background: #fbbf24; color: #2e2344; border: 2px solid #dfd5a7; }
    .toast-info    { background: #6366f1; }
    .toast-msg .lucide { font-size: 1.26em; }
    @keyframes fadeInRight {
      0% { opacity: 0; transform: translateX(35px) scale(0.95);}
      78% { opacity: 1; transform: translateX(-7px) scale(1.02);}
      100% { opacity: 1; transform: translateX(0) scale(1);}
    }
    /* More to be added in next parts... */
  </style>
</head>
<body>
  <!-- ======== NAVIGATION BAR ======== -->
  <nav class="navbar">
    <div class="nav-left">
      <div class="navbar-logo" id="navbar-logo" tabindex="0" aria-label="Reload homepage">
        <i data-lucide="stars"></i>
        NobitaFeedback
      </div>
    </div>
    <div class="nav-right">
      <!-- Bell/Notifications -->
      <button class="nav-btn" id="notifications-btn" aria-label="Notifications">
        <i data-lucide="bell"></i>
        <span id="bell-badge" class="bell-badge" style="display:none;">0</span>
      </button>
      <!-- Theme toggle -->
      <button class="nav-btn theme-toggle-btn" id="theme-toggle-btn" aria-label="Toggle Theme">
        <i data-lucide="moon"></i>
      </button>
      <!-- Language toggle -->
      <button class="nav-btn" id="language-toggle-btn" aria-label="Switch Language">
        <i data-lucide="globe"></i>
      </button>
      <!-- User icon or avatar (dynamic) -->
      <button class="nav-btn" id="login-icon-trigger" aria-label="Login" style="display:flex;">
        <i data-lucide="user"></i>
      </button>
      <button class="nav-avatar-btn" id="user-avatar-trigger" aria-label="Profile" style="display:none;">
        <img src="" class="nav-avatar-img" id="nav-avatar-img" alt="User Avatar" />
        <span class="avatar-badge" id="avatar-badge" style="display:none;"></span>
      </button>
    </div>
  </nav>

  <!-- ======== MODALS ======== -->

  <!-- ==== LOGIN/SIGNUP MODAL ==== -->
  <div class="modal-overlay" id="auth-modal-overlay" style="display:none;">
    <div class="glass-modal animate__animated" id="auth-modal" tabindex="0" aria-modal="true" role="dialog" aria-labelledby="auth-modal-title">
      <button class="modal-close-btn" id="auth-modal-close-btn" aria-label="Close Modal"><i data-lucide="x"></i></button>
      <h2 class="modal-title" id="auth-modal-title">Sign in / Register</h2>
      <!-- Tabs, form, Google btn will come in PART 2 -->
    </div>
  </div>
        <!-- ==== LOGIN / SIGNUP TABS ==== -->
      <div style="display:flex;justify-content:center;gap:18px;margin-bottom:10px;">
        <button id="auth-tab-login" type="button" class="auth-tab-btn" aria-selected="true" style="background:none;border:none;color:#fff;font-weight:bold;font-size:1.16em;letter-spacing:1.2px;padding:7px 20px;border-bottom:3px solid #6366f1;outline:none;cursor:pointer;">Login</button>
        <button id="auth-tab-signup" type="button" class="auth-tab-btn" aria-selected="false" style="background:none;border:none;color:#d8d8fc;font-weight:600;font-size:1.09em;letter-spacing:1px;padding:7px 20px;border-bottom:3px solid transparent;outline:none;cursor:pointer;">Signup</button>
      </div>
      <form id="auth-login-form" autocomplete="on">
        <div class="floating-label-group">
          <input type="email" id="login-email" name="email" required placeholder=" " autocomplete="username" spellcheck="false" />
          <label for="login-email">Email</label>
        </div>
        <div class="floating-label-group">
          <input type="password" id="login-password" name="password" required placeholder=" " minlength="6" autocomplete="current-password" />
          <label for="login-password">Password</label>
          <button type="button" class="input-password-toggle" tabindex="-1" aria-label="Show/Hide Password" id="login-password-toggle"><i data-lucide="eye"></i></button>
        </div>
        <div style="text-align:right;margin-top:-12px;margin-bottom:12px;">
          <a href="#" id="forgot-password-link" style="color:#9db6f9;font-size:0.96em;text-decoration:underline;cursor:pointer;">Forgot password?</a>
        </div>
        <button type="submit" style="width:100%;margin-top:6px;padding:13px 0;background:#6366f1;color:#fff;font-weight:bold;font-size:1.12em;border:none;border-radius:11px;box-shadow:0 2px 8px #5758fa1a;cursor:pointer;transition:background 0.16s;">Log In <i data-lucide="log-in" style="vertical-align:middle;margin-left:7px;"></i></button>
      </form>
      <form id="auth-signup-form" autocomplete="on" style="display:none;">
        <div class="floating-label-group">
          <input type="text" id="signup-name" name="name" required placeholder=" " maxlength="32" autocomplete="name" />
          <label for="signup-name">Name</label>

        <div class="floating-label-group">
          <input type="email" id="signup-email" name="email" required placeholder=" " autocomplete="email" />
          <label for="signup-email">Email</label>
        </div>
        <div class="floating-label-group">
          <input type="password" id="signup-password" name="password" required placeholder=" " minlength="6" autocomplete="new-password" />
          <label for="signup-password">Password</label>
          <button type="button" class="input-password-toggle" tabindex="-1" aria-label="Show/Hide Password" id="signup-password-toggle"><i data-lucide="eye"></i></button>
        </div>
        <button type="submit" style="width:100%;margin-top:8px;padding:13px 0;background:#6366f1;color:#fff;font-weight:bold;font-size:1.12em;border:none;border-radius:11px;box-shadow:0 2px 8px #5758fa1a;cursor:pointer;transition:background 0.16s;">Sign Up <i data-lucide="user-plus" style="vertical-align:middle;margin-left:7px;"></i></button>
      </form>

      <!-- ==== Google Sign-In Button ==== -->
      <button class="google-signin-btn" id="google-signin-btn" type="button">

        Sign in with Google
      </button>
    </div>
  </div>

  <!-- ======= TOAST STACK ======= -->
  <div class="toast-stack" id="toast-stack"></div>

  <!-- ======= MAIN APP CONTENT (rest will come next) ======= -->
  <div class="main-app-content" id="main-app-content">

  </div>
  
  <!-- ============ AUTH & UI SCRIPT PART 1 ============ -->
  <script>
    // Lucide icons init
    window.lucide && window.lucide.createIcons();

    // === Modal, Auth Tabs, Password Toggle, Toast ===
    const loginIconTrigger = document.getElementById('login-icon-trigger');
    const userAvatarTrigger = document.getElementById('user-avatar-trigger');
    const navAvatarImg = document.getElementById('nav-avatar-img');
    const avatarBadge = document.getElementById('avatar-badge');
    const authModalOverlay = document.getElementById('auth-modal-overlay');
    const authModal = document.getElementById('auth-modal');
    const authModalCloseBtn = document.getElementById('auth-modal-close-btn');
    const toastStack = document.getElementById('toast-stack');
    const authTabLogin = document.getElementById('auth-tab-login');
    const authTabSignup = document.getElementById('auth-tab-signup');
    const loginForm = document.getElementById('auth-login-form');
    const signupForm = document.getElementById('auth-signup-form');
    const loginPassword = document.getElementById('login-password');
    const loginPasswordToggle = document.getElementById('login-password-toggle');
    const signupPassword = document.getElementById('signup-password');
    const signupPasswordToggle = document.getElementById('signup-password-toggle');
    const googleSigninBtn = document.getElementById('google-signin-btn');
    const modalOverlay = document.getElementById('auth-modal-overlay');
    const forgotPasswordLink = document.getElementById('forgot-password-link');

    // --- Modal Open/Close Functions ---
    function openAuthModal(tab = "login") {
      authModalOverlay.style.display = 'flex';
      setTimeout(() => authModalOverlay.classList.remove('hide'), 10);
      if(tab === "login") {
        switchAuthTab("login");
      } else {
        switchAuthTab("signup");
      }
      setTimeout(() => {
        // Focus first input
        const input = tab === "login" ? document.getElementById('login-email') : document.getElementById('signup-name');
        if(input) input.focus();
      }, 150);
    }
    function closeAuthModal() {
      authModalOverlay.classList.add('hide');
      setTimeout(() => { authModalOverlay.style.display = 'none'; }, 260);
    }
    // NavBar click triggers
    loginIconTrigger.addEventListener('click', () => openAuthModal('login'));
    authModalCloseBtn.addEventListener('click', closeAuthModal);
    // ESC close
    document.addEventListener('keydown', (e) => {
      if(e.key === "Escape" && authModalOverlay.style.display === 'flex') closeAuthModal();
    });
    // Overlay click close
    authModalOverlay.addEventListener('click', e => {
      if(e.target === authModalOverlay) closeAuthModal();
    });

    // --- Auth Tab Switch Logic ---
    function switchAuthTab(tab) {
      if(tab === "login") {
        authTabLogin.setAttribute('aria-selected', "true");
        authTabLogin.style.color = "#fff";
        authTabLogin.style.borderBottom = "3px solid #6366f1";
        authTabSignup.setAttribute('aria-selected', "false");
        authTabSignup.style.color = "#d8d8fc";
        authTabSignup.style.borderBottom = "3px solid transparent";
        loginForm.style.display = "";
        signupForm.style.display = "none";
      } else {
        authTabLogin.setAttribute('aria-selected', "false");
        authTabLogin.style.color = "#d8d8fc";
        authTabLogin.style.borderBottom = "3px solid transparent";
        authTabSignup.setAttribute('aria-selected', "true");
        authTabSignup.style.color = "#fff";
        authTabSignup.style.borderBottom = "3px solid #6366f1";
        loginForm.style.display = "none";
        signupForm.style.display = "";
      }
      window.lucide && window.lucide.createIcons();
    }
    authTabLogin.addEventListener('click', ()=>switchAuthTab('login'));
    authTabSignup.addEventListener('click', ()=>switchAuthTab('signup'));

    // --- Password Show/Hide ---
    loginPasswordToggle.addEventListener('click', () => {
      loginPassword.type = loginPassword.type === "password" ? "text" : "password";
      loginPasswordToggle.innerHTML = loginPassword.type === "password"
        ? '<i data-lucide="eye"></i>' : '<i data-lucide="eye-off"></i>';
      window.lucide && window.lucide.createIcons();
    });
    signupPasswordToggle.addEventListener('click', () => {
      signupPassword.type = signupPassword.type === "password" ? "text" : "password";
      signupPasswordToggle.innerHTML = signupPassword.type === "password"

    googleSigninBtn.addEventListener('click', async () => {
      showToast({ message: "Redirecting to Google...", type: "info", icon: "circle-dot" });
      // Use Google OAuth2 endpoint
      const params = [
        `client_id=${GOOGLE_CLIENT_ID}`,
        `redirect_uri=${window.location.origin}`,
        `response_type=token`,
        `scope=profile email`,
        `prompt=select_account`
      ].join('&');
      const oauthUrl = `https://accounts.google.com/o/oauth2/v2/auth?${params}`;
      // Open Google OAuth in popup
      const popup = window.open(oauthUrl, "GoogleSignIn", "width=480,height=600");
      // Listen to hash change or message event for access_token
      const pollTimer = setInterval(async () => {
        try {
          if (popup.closed) {
            clearInterval(pollTimer);
            showToast({ message: "Google Sign-In cancelled.", type: "warn", icon: "x-circle" });
            return;
          }
          if (popup.location && popup.location.href && popup.location.href.startsWith(window.location.origin)) {
            clearInterval(pollTimer);
            const hash = popup.location.hash;
            if (hash) {
              const params = new URLSearchParams(hash.substr(1));
              const googleToken = params.get('access_token');
              popup.close();
              if (googleToken) {
                // Exchange Google token with server for JWT
                try {
                  const res = await fetch(`${API_BASE}/api/auth/google-signin`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },

    /* --- FEEDBACK SUBMIT PANEL --- */
    .feedback-panel {
      background: rgba(255,255,255,0.89);
      border-radius: 16px;
      box-shadow: 0 2px 22px #b1aaff14;
      padding: 32px 18px 18px 18px;
      max-width: 570px;
      margin: 30px auto 26px auto;
      font-family: var(--font-main);

      flex-direction: column;

    .star-rating {
      display: flex;

      font-size: 2.3em;
      margin-bottom: 3px;

    .star-icon {
      cursor: pointer;
      opacity: 0.74;
      transition: color 0.18s, opacity 0.18s, transform 0.11s;

    .star-icon.selected,
    .star-icon.hovered { color: #f59e42; opacity: 1; transform: scale(1.22);}
    .star-icon:not(.selected):hover { color: #fbbf24; opacity: 0.98; }
    /* Feedback textarea */
    .feedback-textarea-group {
      position: relative;
      margin-top: 8px;
    }
    .feedback-textarea {
      width: 100%;
      min-height: 55px;
      max-height: 190px;
      padding: 17px 13px 17px 13px;
      font-size: 1.12em;
      border-radius: 8px;
      border: 1.7px solid #b9bcf1;

      outline: none;

      position: absolute;

      pointer-events: none;
      transition: all 0.14s;
      opacity: 0.82;
    }
    .feedback-textarea:focus ~ .feedback-textarea-label,

    /* Attachments & formatting */
    .feedback-toolbar {
      display: flex;
      align-items: center;
      gap: 11px;

    .toolbar-btn {
      background: none; border: none; color: #6366f1;

      transition: background 0.14s;

    .toolbar-btn:hover { background: #d1d5ff34;}
    .anon-toggle-group {
      display: flex; align-items: center; gap: 8px; margin-top: 7px;

    }
    .anon-checkbox { accent-color: #c7c6fa; width:19px; height:19px; }
    /* Submit Button */
    .submit-feedback-btn {
      width: 100%; margin-top: 8px; padding: 15px 0;
      background: var(--primary);
      color: #fff; font-weight: bold; font-size: 1.13em;
      border: none; border-radius: 12px;
      box-shadow: 0 2px 10px #b7b1fd2c;
      cursor: pointer; transition: background 0.17s;
      display: flex; align-items: center; justify-content: center; gap:9px;
    }
    .submit-feedback-btn:disabled { background: #bdbafc; cursor: not-allowed;}
    /* File input & preview */
    .attachment-label {
      display: flex; align-items: center; gap:6px;
      background: #ececff;
      color: #4b53c1;
      border: 1px dashed #acaaf3;
      border-radius: 7px; padding: 6px 15px;
      font-size: 1.06em; cursor: pointer; margin-bottom:6px;
      transition: background 0.13s;
    }
    .attachment-label:hover { background: #d6d4fa;}
    .attachment-preview {
      display: flex; gap: 9px; flex-wrap: wrap; margin: 4px 0 2px 0;
    }
    .attachment-img {
      max-width: 62px; max-height: 62px; border-radius: 6px;
      border: 2px solid #e3defb; background: #f5f3ff;
      object-fit: cover;
    }
    /* === FEEDBACK CARDS === */
    .feedback-list-section { margin:40px auto 34px auto; max-width:740px; }
    .overall-rating-block {
      background: linear-gradient(90deg, #eef2ff 0%, #f5d0fe 100%);

      padding: 19px 30px 10px 30px;
      margin: 0 0 28px 0;
      text-align: center;
      box-shadow: 0 2px 14px #efedff16;
    }
    .overall-stars { font-size: 2.7em; color: #fbbf24; filter: drop-shadow(0 2px 10px #f3e8ffcc);}
    .overall-rating-value { font-size:2.1em;font-family:var(--font-title);font-weight:800;color:#513fd9;}
    .overall-rating-label { color:#837cb2;font-size:1em;letter-spacing:1.1px;}
    .feedback-search-bar {
      margin:0 0 19px 0; display:flex;align-items:center;gap:11px;
      background:#fff;border-radius:7px;padding:10px 16px;box-shadow:0 2px 7px #cbcfff10;
      border:1px solid #d4d5fc;
      font-size:1.14em;
    }
    .feedback-search-bar input {
      border:none;background:none;outline:none;font-size:1.13em;flex:1;
      margin-left:5px;color:#312c6a;
    }
    .feedback-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px #c1bbfc16;
      padding: 20px 19px 13px 19px;
      margin-bottom: 23px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: relative;
      transition: box-shadow 0.16s;
      font-family: var(--font-main);
    }
    .feedback-header {
      display: flex; align-items: center; gap: 13px; margin-bottom: 3px;
    }
    .feedback-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      object-fit: cover; background: #eceeff; border: 2px solid #ede4fd;
    }
    .feedback-user-info {
      display: flex; flex-direction: column;
      font-size: 1em;
      min-width:0;
    }
    .feedback-name { font-weight: 700; color: #322984; font-size:1.13em;}
    .feedback-timestamp { font-size:0.98em; color:#a2a2bb; }
    .feedback-stars { display: flex; align-items: center; gap:2px; font-size:1.22em; }
    .feedback-text { font-size:1.12em; color:#35377e; margin:7px 0; }
    .feedback-attachments { display:flex;gap:10px;margin:5px 0;}
    .feedback-attachment-thumb {
      width:54px;height:54px;border-radius:7px;object-fit:cover;border:1.5px solid #c1bfff;
    }
    .feedback-toolbar-actions {
      display:flex;gap:13px;align-items:center;justify-content:flex-end;
    }
    .feedback-action-btn {
      background: none; border: none; color: #6366f1; font-size: 1.23em;
      padding: 4px 6px; border-radius: 7px; cursor: pointer; transition: background 0.11s;
    }
    .feedback-action-btn:hover { background:#e1e7ff4d;}
    .feedback-admin-reply {
      background: #f1f5ff; border-left: 5px solid #4285F4;
      border-radius: 7px; margin: 7px 0 2px 0; padding: 11px 17px;
      font-size:1.07em;color:#2259a0;display:flex;align-items:center;gap:12px;
    }
    .admin-reply-badge {
      background:#3b82f6;color:#fff;padding:2px 9px;font-size:0.98em;
      border-radius:7px;margin-right:7px;display:inline-flex;align-items:center;gap:5px;
      font-weight:bold;letter-spacing:0.4px;
    }
    /* Infinite Scroll Loader */
    .infinite-loader {
      display:flex;justify-content:center;align-items:center;
      margin:12px 0 15px 0;
    }
    @media (max-width:600px) {
      .feedback-panel,.feedback-list-section {max-width:99vw;padding:14px;}
      .overall-rating-block{padding:12px 2vw;}
    }
  </style>
  <!-- ==== HERO + FEEDBACK SUBMIT PANEL ==== -->
  <div class="hero-welcome" id="hero-welcome">Welcome!</div>
  <div class="feedback-panel" id="feedback-panel" style="display:none;">
    <div class="star-rating" id="star-rating"></div>
    <div class="feedback-textarea-group">
      <textarea id="feedback-text" class="feedback-textarea" placeholder=" " rows="2" maxlength="700" required></textarea>
      <label class="feedback-textarea-label" for="feedback-text">Your feedback...</label>
    </div>
    <div class="feedback-toolbar">
      <label class="attachment-label" for="feedback-attach"><i data-lucide="paperclip"></i>Attach File/Image
        <input type="file" id="feedback-attach" style="display:none;" accept="image/*,.pdf,.doc,.docx,.txt" />
      </label>
      <button class="toolbar-btn" type="button" title="Bold" onclick="insertFormat('bold')"><i data-lucide="bold"></i></button>
      <button class="toolbar-btn" type="button" title="Italic" onclick="insertFormat('italic')"><i data-lucide="italic"></i></button>
      <button class="toolbar-btn" type="button" title="Bullet" onclick="insertFormat('bullet')"><i data-lucide="list"></i></button>
      <button class="toolbar-btn" type="button" title="Emoji" onclick="insertFormat('emoji')"><i data-lucide="smile"></i></button>
      <button class="toolbar-btn" type="button" title="Code" onclick="insertFormat('code')"><i data-lucide="code"></i></button>
    </div>
    <div class="attachment-preview" id="attach-preview"></div>
    <div class="anon-toggle-group">
      <input type="checkbox" id="anon-toggle" class="anon-checkbox"/>
      <label for="anon-toggle"><i data-lucide="user-x"></i>Submit as Anonymous</label>
    </div>
    <button class="submit-feedback-btn" id="submit-feedback-btn" disabled>Submit Feedback <i data-lucide="send"></i></button>
  </div>
  <!-- ==== FEEDBACK LIST, RATING, SEARCH ==== -->
  <div class="feedback-list-section" id="feedback-list-section" style="display:none;">
    <div class="overall-rating-block" id="overall-rating-block" style="display:none;">
      <div class="overall-stars" id="overall-stars"></div>
      <div class="overall-rating-value" id="overall-rating-value">–</div>
      <div class="overall-rating-label" id="overall-rating-label">Based on 0 feedbacks</div>
    </div>
    <div class="feedback-search-bar">
      <i data-lucide="search"></i>
      <input type="text" id="search-feedback" placeholder="Search feedback..." autocomplete="off" />
    </div>
    <div id="feedback-list"></div>
    <div class="infinite-loader" id="infinite-loader" style="display:none;">
      <i data-lucide="loader" class="lucide-spin"></i> Loading...
    </div>
  </div>
  
    // -- HERO GREETING --
    function greetUser() {
      const hero = document.getElementById('hero-welcome');
      if (currentUser) {
        hero.textContent = `Welcome, ${currentUser.name}!`;
      } else {
        hero.textContent = `Welcome! Please log in to give feedback.`;
      }
      hero.style.display = "";
    }
    // --- STAR RATING (Submit Panel) ---
    let selectedRating = 0, hoverRating = 0;
    const starRatingDiv = document.getElementById('star-rating');
    function renderStars() {
      starRatingDiv.innerHTML = '';
      for (let i=1; i<=5; ++i) {
        const star = document.createElement('i');
        star.setAttribute('data-lucide', 'star');
        star.className = "star-icon" + (i <= (hoverRating || selectedRating) ? ' selected' : '');
        star.title = `${i} Star${i>1?'s':''}`;
        star.setAttribute('tabindex', '0');
        star.setAttribute('aria-label', `${i} Star`);
        star.addEventListener('mouseenter', ()=>{hoverRating = i; renderStars();});
        star.addEventListener('mouseleave', ()=>{hoverRating = 0; renderStars();});
        star.addEventListener('click', ()=>{selectedRating = i; renderStars(); checkFeedbackBtn();});
        star.addEventListener('keydown', (e)=>{ if(['Enter',' '].includes(e.key)) {selectedRating = i; renderStars(); checkFeedbackBtn();} });
        starRatingDiv.appendChild(star);
      }
      window.lucide && window.lucide.createIcons({ icons: starRatingDiv.querySelectorAll('i') });
    }
    function checkFeedbackBtn() {
      const txt = document.getElementById('feedback-text').value.trim();
      document.getElementById('submit-feedback-btn').disabled = !(selectedRating && txt.length > 0);
    }
    // --- Feedback Textarea ---
    document.getElementById('feedback-text').addEventListener('input', checkFeedbackBtn);

    // --- Attachment logic ---
    let attachmentFile = null;
    document.getElementById('feedback-attach').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      attachmentFile = file;
      const preview = document.getElementById('attach-preview');
      preview.innerHTML = '';
      if (file.type.startsWith('image/')) {
        const img = document.createElement('img');
        img.className = "attachment-img";
        img.src = URL.createObjectURL(file);
        preview.appendChild(img);
      } else {
        preview.innerHTML = `<div style="color:#555;font-size:1.04em;"><i data-lucide="file"></i> ${file.name}</div>`;
        window.lucide && window.lucide.createIcons();
      }
    });

    // --- Formatting Toolbar (simple insert) ---
    function insertFormat(type) {
      const textarea = document.getElementById('feedback-text');
      let insert = '';
      if (type === 'bold') insert = '**Bold** ';
      else if (type === 'italic') insert = '_Italic_ ';
      else if (type === 'bullet') insert = '\n- ';
      else if (type === 'emoji') insert = '🙂 ';
      else if (type === 'code') insert = '`code` ';
      const start = textarea.selectionStart, end = textarea.selectionEnd;
      textarea.value = textarea.value.slice(0, start) + insert + textarea.value.slice(end);
      textarea.focus(); textarea.selectionEnd = start + insert.length;
      checkFeedbackBtn();
    }
    window.insertFormat = insertFormat; // Expose for inline onclick

    // --- Anon toggle logic ---
    let isAnon = false;
    document.getElementById('anon-toggle').addEventListener('change', (e)=>{
      isAnon = e.target.checked;
    });

    // --- Feedback Submit ---
    document.getElementById('submit-feedback-btn').addEventListener('click', async () => {
      if (!currentUser || !jwtToken) {
        showToast({ message: "Login required to submit feedback.", type: "error", icon: "alert-triangle" }); return;
      }
      if (!selectedRating) { showToast({ message: "Please select a rating.", type: "warn", icon: "star" }); return; }
      const text = document.getElementById('feedback-text').value.trim();
      if (!text) { showToast({ message: "Enter feedback.", type: "error", icon: "edit-3" }); return; }
      document.getElementById('submit-feedback-btn').disabled = true;
      let attachmentUrl = null;
      if (attachmentFile) {
        const formData = new FormData(); formData.append('file', attachmentFile);
        try {
          const res = await fetch(`${API_BASE}/api/feedback/upload-attachment`, {
            method:"POST",
            headers: { 'Authorization': `Bearer ${jwtToken}` },
            body: formData
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.message || "Attachment upload failed.");
          attachmentUrl = data.url;
        } catch (err) {
          showToast({ message: "Attachment upload failed.", type:"error", icon:"alert-triangle"});
          document.getElementById('submit-feedback-btn').disabled = false; return;
        }
      }
      // Now submit feedback
      try {
        const res = await fetch(`${API_BASE}/api/feedback/create`, {
          method:"POST",
          headers: {
            "Content-Type":"application/json",
            'Authorization': `Bearer ${jwtToken}`
          },
          body: JSON.stringify({
            rating: selectedRating, text, anonymous: isAnon, attachment: attachmentUrl
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || "Feedback failed.");
        showToast({ message:"Feedback submitted!", type:"success", icon:"send"});
        // Optimistically add to list:
        fetchFeedbacks(true); // refresh top
        document.getElementById('feedback-text').value = '';
        document.getElementById('attach-preview').innerHTML = '';
        document.getElementById('feedback-attach').value = '';
        attachmentFile = null; selectedRating = 0; hoverRating = 0;
        renderStars(); checkFeedbackBtn();
      } catch (err) {
        showToast({ message: err.message, type:"error", icon:"alert-triangle"});
      }
      document.getElementById('submit-feedback-btn').disabled = false;
    });

    // --- Feedback List + Rating ---
    let feedbacks = [], feedbackPage = 1, hasMoreFeedback = true, searchQuery = "";
    async function fetchFeedbacks(refresh=false) {
      if (refresh) { feedbackPage=1; hasMoreFeedback=true; feedbacks=[]; }
      if (!hasMoreFeedback) return;
      document.getElementById('infinite-loader').style.display = "flex";
      let url = `${API_BASE}/api/feedback/list?page=${feedbackPage}`;
      if (searchQuery) url = `${API_BASE}/api/feedback/search?query=${encodeURIComponent(searchQuery)}`;
      const res = await fetch(url, {
        headers: { 'Authorization': jwtToken ? `Bearer ${jwtToken}` : undefined }
      });
      const data = await res.json();
      document.getElementById('infinite-loader').style.display = "none";
      if (Array.isArray(data.feedbacks)) {
        if (refresh) feedbacks = [];
        feedbacks = feedbacks.concat(data.feedbacks);
        renderFeedbacks();
        feedbackPage++;
        hasMoreFeedback = data.feedbacks.length >= 10;
      }
      // Update overall rating
      fetchOverallRating();
    }

    function renderFeedbacks() {
      const list = document.getElementById('feedback-list');
      list.innerHTML = '';
      feedbacks.forEach(fb => {
        const card = document.createElement('div');
        card.className = 'feedback-card';
        // Avatar
        const avatarUrl = fb.anonymous
          ? "https://api.dicebear.com/8.x/micah/svg?seed=Anonymous"
          : (fb.user?.avatarUrl || "https://api.dicebear.com/8.x/adventurer/svg?seed=" + encodeURIComponent(fb.user?.name || "Nobita"));
        // Header
        card.innerHTML = `
          <div class="feedback-header">
            <img src="${avatarUrl}" class="feedback-avatar" alt="Avatar"/>
            <div class="feedback-user-info">
              <div class="feedback-name">${fb.anonymous ? 'Anonymous' : (fb.user?.name||"Unknown")}</div>
              <div class="feedback-timestamp">${new Date(fb.createdAt).toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})}</div>
              <div class="feedback-stars">${Array.from({length:fb.rating}).map(()=>'<i data-lucide="star"></i>').join('')}</div>
            </div>
          </div>
          <div class="feedback-text">${formatMarkdown(fb.text)}</div>
          ${fb.attachment? `<div class="feedback-attachments"><a href="${fb.attachment}" target="_blank">${fb.attachment.endsWith('.jpg')||fb.attachment.endsWith('.png')? `<img src="${fb.attachment}" class="feedback-attachment-thumb"/>` : `<i data-lucide="file"></i> File`}</a></div>` : ''}
          <div class="feedback-toolbar-actions"></div>
        `;
        // Action buttons
        const toolbar = card.querySelector('.feedback-toolbar-actions');
        if (currentUser && (fb.userId === currentUser._id || currentUser.email === "samshaad365@gmail.com")) {
          const editBtn = document.createElement('button');
          editBtn.className = "feedback-action-btn";
          editBtn.title = "Edit Feedback"; editBtn.innerHTML = '<i data-lucide="edit-3"></i>';
          // TODO: Add edit feedback logic/modal
          const delBtn = document.createElement('button');
          delBtn.className = "feedback-action-btn";
          delBtn.title = "Delete Feedback"; delBtn.innerHTML = '<i data-lucide="trash-2"></i>';
          delBtn.onclick = ()=>deleteFeedback(fb._id);
          toolbar.appendChild(editBtn); toolbar.appendChild(delBtn);
        }
        // Share button
        const shareBtn = document.createElement('button');
        shareBtn.className = "feedback-action-btn"; shareBtn.title="Share";
        shareBtn.innerHTML = '<i data-lucide="share-2"></i>';
        shareBtn.onclick = ()=>shareFeedback(fb._id);
        toolbar.appendChild(shareBtn);

        // If admin reply present
        if (fb.adminReply) {
          card.innerHTML += `
            <div class="feedback-admin-reply">
              <span class="admin-reply-badge"><i data-lucide="shield"></i> Admin Response</span>
              ${formatMarkdown(fb.adminReply.text)}
            </div>
          `;
        }
        list.appendChild(card);
      });
      window.lucide && window.lucide.createIcons({ icons: list.querySelectorAll('i') });
    }

    // --- Feedback Actions (delete, share) ---
    async function deleteFeedback(id) {
      if (!confirm("Are you sure you want to delete this feedback?")) return;
      const res = await fetch(`${API_BASE}/api/feedback/delete/${id}`, {
        method: "DELETE",
        headers: { 'Authorization': `Bearer ${jwtToken}` }
      });
      const data = await res.json();
      if (!res.ok) showToast({ message: data.message, type:"error", icon:"alert-triangle"});
      else { showToast({ message:"Feedback deleted!", type:"success", icon:"trash-2"}); fetchFeedbacks(true);}
    }
    function shareFeedback(id) {
      const url = `${window.location.origin}/feedback/${id}`;
      navigator.clipboard.writeText(url);
      showToast({ message:"Feedback link copied!", type:"success", icon:"copy"});
    }
    function formatMarkdown(text) {
      return text.replace(/\*\*(.*?)\*\*/g,'<b>$1</b>')
        .replace(/_(.*?)_/g,'<i>$1</i>')
        .replace(/`(.*?)`/g,'<code>$1</code>')
        .replace(/\n- (.*?)(?=\n|$)/g,'<ul><li>$1</li></ul>')
        .replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank">$1</a>')
        .replace(/\n/g,"<br/>");
    }

    // --- Search logic ---
    document.getElementById('search-feedback').addEventListener('input', function() {
      searchQuery = this.value.trim();
      fetchFeedbacks(true);
    });

    // --- Infinite Scroll ---
    window.addEventListener('scroll', ()=>{
      if(window.innerHeight+window.scrollY+50 >= document.body.offsetHeight && hasMoreFeedback){
        fetchFeedbacks();
      }
    });

    // --- Overall Rating ---
    async function fetchOverallRating() {
      const res = await fetch(`${API_BASE}/api/feedback/overall-rating`);
      const data = await res.json();
      if (!data || !data.avg) return document.getElementById('overall-rating-block').style.display="none";
      document.getElementById('overall-rating-block').style.display="";
      document.getElementById('overall-stars').innerHTML = Array.from({length:Math.round(data.avg)}).map(()=>'<i data-lucide="star"></i>').join('');
      document.getElementById('overall-rating-value').textContent = Number(data.avg).toFixed(2);
      document.getElementById('overall-rating-label').textContent = `Based on ${data.count} feedback${data.count>1?'s':''}`;
      window.lucide && window.lucide.createIcons({ icons: document.getElementById('overall-stars').querySelectorAll('i') });
    }

    // --- INIT ALL ---
    function appInit() {
      renderStars(); greetUser();
      if(currentUser) {
        document.getElementById('feedback-panel').style.display = "";
        document.getElementById('feedback-list-section').style.display = "";
        fetchFeedbacks(true);
      } else {
        document.getElementById('feedback-panel').style.display = "none";
        document.getElementById('feedback-list-section').style.display = "";
        fetchFeedbacks(true);
      }
    }
    appInit();
    // On login/logout
    window.updateUIAfterLogin = function() {
      greetUser(); appInit();
      // Other UI updates from previous parts
      // ...already wired!
    }
  </script>
  <!-- Lucide icon refresh -->
  <script>window.lucide && window.lucide.createIcons();</script>
