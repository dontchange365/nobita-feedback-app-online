    <style>
    :root {
        --primary-color: #6a0dad; /* Dark Purple */
        --secondary-color: #FFD700; /* Gold */
        --accent-color: #3B82F6; /* Bright Blue */
        --text-color-light: #f4f4f9; /* Off-white */
        --text-color-dark: #2c3e50; /* Dark Slate Blue */
        --bg-gradient-start: #1a1a2e; /* Darker Purple Blue */
        --bg-gradient-end: #16213e; /* Even Darker Purple Blue */
        --card-bg-popup: #272c3a; /* Darker grey for popup */
        --card-bg: rgba(44, 62, 80, 0.85); /* Darker blue, semi-transparent */
        --card-border: rgba(255, 255, 255, 0.15);
        --input-bg: rgba(255, 255, 255, 0.08);
        --shadow-deep: 0 10px 30px rgba(0, 0, 0, 0.5);
        --success-color: #28a745; /* Green */
        --error-color: #dc3545; /* Red */
        --info-color: var(--accent-color); /* Blue */
        --confirm-color: #fd7e14; /* Orange */

        --google-blue: #4285F4;
        --progress-bg: #4a4a60;
        --progress-fill-color: #27ae60;

        /* New gradient for borders/glows */
        --border-gradient: linear-gradient(135deg, #8B5CF6, #EC4899);
        --glow-color-start: rgba(139, 92, 246, 0.6); /* Purple */
        --glow-color-end: rgba(236, 72, 153, 0.6); /* Pink */
    }

    html {
        scroll-behavior: smooth;
    }

    body {
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
        color: var(--text-color-light);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start; /* Align content to top */
        min-height: 100vh;
        margin: 0;
        padding: 0 15px 25px 15px; /* Add bottom padding */
        box-sizing: border-box;
        overflow-x: hidden; /* Prevent horizontal scroll */
    }

 .profile-password-btns-row .popup-button.primary {
    background: linear-gradient(45deg, var(--accent-color), #2563EB);

}

.profile-password-btns-row  .popup-button.primary:hover {
    background: linear-gradient(45deg, #2563EB, var(--accent-color));
    transform: translateY(-2px);
}
        /* --- Corner Triggers (Login Icon / User Avatar) --- */
        /* Base styles for both login icon and profile badge */
        .corner-trigger-base {
            position: fixed;
            top: 12px;
            right: 12px;
            cursor: pointer;
            z-index: 1000;
            transition: all 0.3s ease-in-out;
            display: flex; /* Use flex for centering content */
            align-items: center;
            justify-content: center;
            box-sizing: border-box; /* Include padding and border in element's total width and height */
        }

        /* Login Icon (Before Login) */
        #login-icon-trigger {
            width: 48px;
            height: 48px;
            border-radius: 50%; /* Perfect circle */
            background: rgba(255, 255, 255, 0.1); /* Circular glass background */
            backdrop-filter: blur(8px); /* Blur effect */
            border: 2px solid transparent; /* For gradient border */
            background-clip: padding-box; /* Ensures background doesn't cover border */
            box-shadow: 0 0 10px rgba(0,0,0,0.3), 0 0 20px var(--glow-color-start); /* Soft glowing shadow */
            animation: pulse 2s infinite ease-in-out; /* Pulsing animation */
            display: flex; /* Hidden by default, shown by JS */
        }

        #login-icon-trigger::before {
            content: '';
            position: absolute;
            inset: -2px; /* Extend slightly beyond the element */
            border-radius: inherit; /* Inherit border-radius from parent */
            background: var(--border-gradient); /* Gradient border */
            z-index: -1; /* Behind the main content */
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            padding: 2px; /* Border thickness */
        }

        #login-icon-trigger .fas {
            font-size: 2.2em; /* Feather-style user icon */
            color: var(--secondary-color); /* Gold color for icon */
            transition: transform 0.2s ease-out;
        }

        #login-icon-trigger:hover {
            transform: scale(1.08);
            box-shadow: 0 0 15px rgba(0,0,0,0.4), 0 0 30px var(--glow-color-end);
        }

        #login-icon-trigger:active {
            transform: scale(1.05); /* Tap effect */
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 10px rgba(0,0,0,0.3), 0 0 20px var(--glow-color-start); }
            50% { box-shadow: 0 0 15px rgba(0,0,0,0.4), 0 0 35px var(--glow-color-end); }
            100% { box-shadow: 0 0 10px rgba(0,0,0,0.3), 0 0 20px var(--glow-color-start); }
        }

        /* Mobile Version – Avatar + Name (After Login) */
        #user-profile-trigger {
            /* REMOVED: display: none; */ /* Ab, iski initial hidden state sirf 'hidden' class se manage hogi */
            flex-direction: row; /* Default horizontal layout */
            align-items: center;
            gap: 8px; /* Spacing between avatar and name */
            padding: 6px 12px; /* Padding for the pill container */
            border-radius: 50px; /* Rounded pill container */
            background: rgba(255, 255, 255, 0.1); /* Glass effect with blur */
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            position: fixed; /* Fixed position */
            top: 12px;
            right: 12px;
            z-index: 1000;
            transition: all 0.3s ease-in-out;
        }

        #user-profile-trigger:hover {
            transform: scale(1.05); /* Hover animation */
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }

        #user-profile-trigger.hidden {
            display: none;
        }

        #user-profile-avatar {
            width: 40px; /* 40x40px circle */
            height: 40px;
            border-radius: 50%; /* Perfect circle avatar */
            object-fit: cover;
            border: 2px solid transparent; /* For gradient border */
            background-clip: padding-box;
            box-shadow: 0 0 8px rgba(0,0,0,0.3), 0 0 15px var(--glow-color-start); /* Soft drop-shadow */
            transition: all 0.3s ease-in-out;
        }

        /* Gradient border for user-profile-avatar */
        #user-profile-avatar::before {
            content: '';
            position: absolute;
            inset: -2px; /* Extend slightly beyond the image */
            border-radius: inherit;
            background: var(--border-gradient); /* Thin gradient border */
            z-index: -1;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            padding: 2px;
        }


        #user-profile-name {
            font-size: clamp(12px, 2.5vw, 15px); /* Responsive font size */
            font-weight: 600; /* Bold */
            color: #F0F0F0; /* White-light */
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5); /* Subtle text-shadow */
            white-space: nowrap; /* Prevent name from wrapping */
            overflow: hidden;
            text-overflow: ellipsis; /* Add ellipsis if too long */
            max-width: 100px; /* Limit width to prevent overflow */
        }

        /* Custom Tooltip for Profile Badge */
        .profile-tooltip {
            position: absolute;
            bottom: -35px; /* Position below the badge */
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7); /* Translucent black */
            backdrop-filter: blur(3px); /* Blur white */
            color: #fff;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.8em; /* Small, clean font */
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        #user-profile-trigger:hover .profile-tooltip {
            opacity: 1;
            transform: translateX(-50%) translateY(-5px); /* Slight lift on hover */
            transition-delay: 0.2s; /* Delay for smooth appearance */
        }


        /* Removed .corner-trigger.avatar-mode as the base .corner-trigger is now circular and scaled */

        /* --- Auth Modals (Login/Signup/Profile) --- */
        .auth-modal-overlay {
            display: none; /* Hidden by default */
            position: fixed;
            inset: 0; /* top, right, bottom, left */
            background: rgba(0,0,0,0.75); /* Semi-transparent dark overlay */
            backdrop-filter: blur(5px); /* Blurry background effect */
            align-items: center;
            justify-content: center;
            z-index: 1002; /* Higher than page content */
            opacity: 0; /* Start invisible for transition */
            pointer-events: none; /* Don't block clicks when invisible */
            transition: opacity 0.25s ease-out;
        }

        .auth-modal-overlay.active {
            display: flex; /* Show when active */
            opacity: 1;
            pointer-events: all; /* Enable clicks when visible */
        }

        .auth-modal-content {
            background: var(--bg-gradient-end);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            padding: 25px;
            width: 90%;
            max-width: 400px;
            position: relative;
            box-shadow: 0 5px 25px rgba(0,0,0,0.3);
            color: var(--text-color-light);\
            transform: scale(0.95);
            opacity:0;
            transition: transform 0.25s ease-out, opacity 0.2s ease-out;
            overflow-y: auto; /* Add vertical scroll */
            max-height: 80vh; /* Limit modal height */
        }
        .auth-modal-overlay.active .auth-modal-content {
            transform: scale(1); /* Scale up to normal size */
            opacity: 1;
        }

        .auth-modal-content h2 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.6em;
            font-family: 'Poppins', sans-serif;
            font-weight:600;
            color: var(--secondary-color);
            text-align: center;
        }

        .auth-modal-content .close-modal-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            cursor: pointer;
            font-size: 26px;
            color: var(--text-color-light);
            line-height: 1;
            padding:5px;
            transition: color 0.2s;
        }

        .auth-modal-content .close-modal-btn:hover {
            color: var(--secondary-color);
        }

        .auth-modal-form input[type="email"],
        .auth-modal-form input[type="password"],
        .auth-modal-form input[type="text"] {
            width: 100%;
            box-sizing: border-box; /* Include padding in width */
            padding: 12px 15px;
            margin-bottom: 15px;
            border: 1px solid var(--card-border);
            border-radius: 6px;
            background: var(--input-bg);
            color: var(--text-color-light);
            font-size: 0.95em;
        }

        .auth-modal-form input:focus {
            border-color: var(--accent-color);
            background: rgba(255,255,255,0.1);
        }

        .auth-modal-form button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .auth-modal-form button:hover {
            transform: translateY(-1px);
        }

        .auth-modal-form button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .auth-modal-form button[type=submit] {
            background: var(--accent-color);
            color: #fff;
        }

        .auth-modal-form button[type=submit]:hover {
            background: #3578e0;
        }

        .auth-modal-form .form-links {
            display: flex;
            justify-content: space-between;
            font-size: 0.85em;
            margin-top: 15px;
            margin-bottom: 15px;
        }

        .auth-modal-form .form-links a {
            color: var(--secondary-color);
            text-decoration: none;
        }

        .auth-modal-form .form-links a:hover {
            text-decoration: underline;
        }

        .auth-modal-form .google-auth-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            border: 1px solid var(--card-border);
            background: #fff;
            color: #555;
            cursor: pointer;
            font-weight: 500;
        }

        .auth-modal-form .google-auth-btn img {
            height: 18px;
            margin-right: 10px;
        }

        .auth-modal-form .google-auth-btn:hover {
            background: #f8f8f8;
        }

        /* --- User Profile Modal Specific Styles --- */
        .profile-modal-content {
            max-width: 500px; /* Slightly wider for profile */
            padding: 35px;
        }

        .profile-avatar-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 25px;
            position: relative;
        }

        #profile-display-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--secondary-color);
            box-shadow: 0 0 15px rgba(255,215,0,0.5);
            margin-bottom: 15px;
        }

        .upload-avatar-btn { /* This is the "Change Avatar" button */
            background-color: var(--primary-color);
            color: var(--secondary-color);
            padding: 8px 15px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 500;
            transition: background-color 0.2s, transform 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid var(--secondary-color);
        }

        .upload-avatar-btn:hover {
            background-color: #550a8a; /* Darker primary on hover */
            transform: translateY(-2px);
        }

        .upload-avatar-btn i {
            font-size: 1.1em;
        }

        .upload-progress-bar {
            width: 80%;
            height: 15px;
            background-color: var(--progress-bg);
            border-radius: 8px;
            margin-top: 15px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background-color: var(--progress-fill-color);
            border-radius: 8px;
            transition: width 0.3s ease-out;
        }

        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 0.75em;
            font-weight: bold;
            text-shadow: 0 0 3px rgba(0,0,0,0.5);
        }

        /* Styling for the new UPLOAD AVATAR button */
        #upload-avatar-now-btn {
            background: linear-gradient(45deg, var(--success-color), #218838); /* Green gradient */
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 0.9em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex; /* Use flex to align icon and text */
            align-items: center;
            justify-content: center;
            gap: 8px; /* Space between icon and text */
        }

        #upload-avatar-now-btn:hover {
            background: linear-gradient(45deg, #218838, var(--success-color));
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(40,167,69,0.3);
        }

        #profile-edit-form .input-group,
        #change-password-form .input-group {
            margin-bottom: 15px;
        }

        #profile-edit-form label,
        #change-password-form label {
            font-size: 0.9em;
            margin-bottom: 5px;
            color: var(--text-color-light);
        }

        #profile-name, #profile-email,
        #current-password, #new-password-profile, #confirm-new-password-profile {
            width: 100%;
            box-sizing: border-box;
            padding: 10px 12px;
            border: 1px solid var(--card-border);
            border-radius: 6px;
            background: var(--input-bg);

        }

        #profile-email:disabled {

        }

        #save-profile-changes-btn, #change-password-btn {
            background: linear-gradient(45deg, var(--accent-color), #2563EB);
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 0.95em;
            font-weight: 500;

        #save-profile-changes-btn:hover, #change-password-btn:hover {

            transform: translateY(-2px);
        }

        .profile-divider {
            border: 0;
            height: 1px;
            background: rgba(255, 255, 255, 0.15);
            margin: 25px 0;
        }

        /* --- User Menu (Dropdown) --- */
        .user-profile-menu {
            display: none; /* Hidden by default */
            position: fixed;
            top: 70px; /* Position below the avatar trigger */
            right: 20px;
            width: 240px; /* Fixed width */
            background: var(--bg-gradient-end); /* Dark background */
            border: 1px solid var(--card-border);
            border-radius: 10px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3); /* Soft shadow */
            z-index: 1000;
            opacity: 0; /* Start invisible */
            pointer-events:none; /* Don't block clicks */
            transform: translateY(-10px) scale(0.95); /* Slightly off for animation */
            transition: opacity 0.25s ease-out, transform 0.25s ease-out;
        }

        .user-profile-menu.active {
            display: block; /* Show when active */
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events:all; /* Enable clicks */
        }

        .user-profile-menu .menu-content {
            padding: 0;
        }

        .user-profile-menu .menu-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 15px;
            border-bottom: 1px solid var(--card-border);
        }

        .user-profile-menu .menu-header img {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            margin-bottom: 10px;
            object-fit: cover;
            border: 2px solid var(--secondary-color);
        }

        .user-profile-menu .menu-header .username {
            font-weight: 600;
            font-size: 1.1em;
            color: var(--text-color-light);
            text-align: center;
        }

        .user-profile-menu ul {
            list-style: none;
            padding: 10px 0;
            margin: 0;
        }

        .user-profile-menu ul li a {
            color: var(--text-color-light);
            text-decoration: none;
            font-size: 0.95em;
            display: block;
            padding: 10px 20px;
            border-radius: 0; /* Remove rounded corners */
            transition: background-color 0.2s, color 0.2s;
        }

        .user-profile-menu ul li a:hover {
            background: var(--primary-color);
            color: var(--secondary-color);
        }

        .user-profile-menu ul li a .fas {
            margin-right: 10px;
            width: 16px; /* Ensure consistent icon alignment */
            text-align: center;
        }

        /* --- STYLISH UNIVERSAL POPUP --- */
        .stylish-popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw; /* Full viewport width */
            height: 100vh; /* Full viewport height */
            background: rgba(10, 10, 20, 0.6); /* Semi-transparent dark background */
            backdrop-filter: blur(5px); /* Blurry background effect */
            display: none; /* CRUCIAL: Hidden by default */
            align-items: center;
            justify-content: center;
            opacity: 0; /* Start invisible for animation */
            pointer-events: none; /* Don't block interaction when hidden */
            transition: opacity 0.2s ease-in-out !important; /* Forcing transition */
            z-index: 1005; /* Ensures it's on top of everything */
        }

        .stylish-popup-overlay.active {
            display: flex !important; /* Show when active */
            opacity: 1 !important;
            pointer-events: all !important; /* Enable interaction when active */
        }

        .stylish-popup-card {
            background: var(--card-bg-popup); /* Dark background */
            border: 1px solid var(--card-border);
            border-radius: 12px; /* Slightly more rounded */
            padding: 25px 30px; /* More padding */

            width: 90%;
            box-shadow: 0 12px 40px rgba(0,0,0,0.3); /* Deeper shadow */

            transform: translateY(10px) scale(0.95); /* Slight movement/scale for animation */
            opacity: 0; /* Start invisible for animation */
            transition: transform 0.25s cubic-bezier(0.25, 0.8, 0.25, 1) !important, opacity 0.25s ease-out !important; /* Bouncy transition */
            position: relative; /* For close button positioning */

        }

        .stylish-popup-overlay.active .stylish-popup-card {
            transform: translateY(0) scale(1);
            opacity: 1;
        }

        .stylish-popup-card .popup-icon-area {
            font-size: 2.8em;
            margin-bottom: 18px;
            line-height: 1; /* Prevent extra space below icon */
        }

        .stylish-popup-card .popup-icon-area.success { color: var(--success-color); }
        .stylish-popup-card .popup-icon-area.error { color: var(--error-color); }
        .stylish-popup-card .popup-icon-area.info { color: var(--info-color); }
        .stylish-popup-card .popup-icon-area.warning { color: orange; } /* Warning color for popups */
        .stylish-popup-card .popup-icon-area.confirm { color: var(--confirm-color); }
        .stylish-popup-card .popup-icon-area.forgot_password { color: var(--secondary-color); }

        .stylish-popup-card h2.popup-title {
            margin-top:0;
            margin-bottom: 12px;
            font-size: 1.5em;
            color: var(--secondary-color);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
        }

        .stylish-popup-card p.popup-message {
            margin-bottom: 25px;
            font-size: 0.95em;
            color: var(--text-color-light);
            line-height: 1.6;
        }

        .stylish-popup-card .popup-form-input-group {
            margin-bottom: 20px;
            text-align:left;
        }

        .stylish-popup-card .popup-form-input-group input {
            width: 100%;
            box-sizing: border-box;
            padding: 10px 12px;
            border: 1px solid var(--card-border);
            border-radius: 6px;
            background: var(--input-bg);
            color: var(--text-color-light);
            font-size: 0.95em;
        }

        .stylish-popup-card .popup-form-input-group input:focus {
            border-color: var(--accent-color);
            background: rgba(255,255,255,0.1);
        }

        .stylish-popup-card .popup-button-container {
            display: flex;
            justify-content: center;
            gap: 12px; /* Space between buttons */
            flex-wrap: wrap; /* Allow buttons to wrap on smaller screens */
        }

        .stylish-popup-card .popup-button {
            padding: 10px 22px;
            border: none;

        /* Confetti animation */

            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none; /* Don't block clicks */
            z-index: 1; /* Behind content */

        // Helper for API requests
        async function apiRequest(url, method, body = null, isFormData = false) {
            const headers = {};
            if (!isFormData) {
                headers['Content-Type'] = 'application/json';
            }

            const token = localStorage.getItem('authToken');
            if (token) headers['Authorization'] = `Bearer ${token}`;

            let submitBtn;
            if(url.includes('/api/auth/login')) submitBtn = emailLoginForm.querySelector('button[type="submit"]');
            else if(url.includes('/api/auth/signup')) submitBtn = emailSignupForm.querySelector('button[type="submit"]');
            else if(url.includes('/api/user/profile') && method === 'PUT') submitBtn = saveProfileChangesBtn;
            else if(url.includes('/api/user/change-password')) submitBtn = changePasswordBtn;
            else if(url.includes('/api/feedback')) submitBtn = submitButton;
            // The uploadAvatarNowBtn is handled separately for Cloudinary direct upload
            // So, no need to add it here in generic apiRequest function for enabling/disabling

            if(submitBtn) {
                submitBtn.disabled = true;
                // Check if it already has an icon, otherwise add one
                if (!submitBtn.innerHTML.includes('<i class="fas fa-spinner fa-spin"></i>')) {
                    submitBtn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> ${submitBtn.textContent}...`;
                } else {
                    submitBtn.innerHTML = submitBtn.innerHTML.replace('...', '...'); // Just keep it as is if already spinning
                }
            }

            try {
                const response = await fetch(url, { method, headers, body: isFormData ? body : (body ? JSON.stringify(body) : null) });
                const data = await response.json();
                if (!response.ok) throw new Error(data.message || `Server error (${response.status})`);
                return data;
            } catch (error) {
                console.error(`API request error to ${url}:`, error);
                if (!(url.includes('/api/auth/me') && error.message && error.message.toLowerCase().includes("token valid nahi hai"))) {
                    showStylishPopup('error', 'Error', error.message || 'Server communication error.');
                }
                // Re-enable button on error, setting original text
                if(submitBtn) {
                    submitBtn.disabled = false;
                    // Reset text for specific buttons
                    if(url.includes('login')) submitBtn.textContent = "Login";
                    else if(url.includes('signup')) submitBtn.textContent = "Sign Up";
                    else if(url.includes('/api/user/profile') && method === 'PUT') submitBtn.textContent = "Save Changes";
                    else if(url.includes('/api/user/change-password')) submitBtn.textContent = "Change Password";
                    // REMOVED: else if(url.includes('/api/feedback')) submitBtn.textContent = isEditing ? "UPDATE FEEDBACK" : "SUBMIT FEEDBACK";
                    else if(url.includes('/api/feedback')) submitBtn.textContent = "SUBMIT FEEDBACK"; // Always submit
                }
                throw error;
            } finally {
                // This finally block ensures buttons are re-enabled even if an error occurs but wasn't caught by a specific handler.
                if(submitBtn && submitBtn.disabled && submitBtn.innerHTML.includes('spinner')) {
                    // Only reset if it's currently showing spinner/processing text
                    if(url.includes('login')) submitBtn.textContent = "Login";
                    else if(url.includes('signup')) submitBtn.textContent = "Sign Up";
                    else if(url.includes('/api/user/profile') && method === 'PUT') submitBtn.textContent = "Save Changes";
                    else if(url.includes('/api/user/change-password')) submitBtn.textContent = "Change Password";
                    // REMOVED: else if(url.includes('/api/feedback')) submitBtn.textContent = isEditing ? "UPDATE FEEDBACK" : "SUBMIT FEEDBACK";
                    else if(url.includes('/api/feedback')) submitBtn.textContent = "SUBMIT FEEDBACK"; // Always submit
                    submitBtn.disabled = false;
                }
            }
        }

        async function handleGoogleCredentialResponse(response) {
            try {
                const data = await apiRequest(API_GOOGLE_SIGNIN_URL, 'POST', { token: response.credential });
                handleAuthResponse(data);
            } catch (error) {
                // Error handled by apiRequest
            }
        }

        // Check Login Status from local storage and validate token
        async function checkLoginStatus() {
            const token = localStorage.getItem('authToken');
            if (token) {
                try {
                    const userData = await apiRequest(API_VALIDATE_TOKEN_URL, 'GET');
                    currentUser = userData;
                    updateUIAfterLogin();
                } catch (error) {
                    // Token invalid or expired, clear and update UI
                    localStorage.removeItem('authToken');
                    currentUser = null;
                    updateUIAfterLogout();
                }
            } else {
                updateUIAfterLogout();
            }
            await fetchFeedbacks(); // Always fetch feedbacks regardless of login status
        }

                    userProfileTrigger.style.display = 'flex'; // Explicitly set to flex to ensure it displays
                    userProfileTrigger.classList.remove('hidden'); // hidden class ko remove karega
                    // **FIX:** Login hone par opacity aur pointer-events ko reset karein
                    userProfileTrigger.style.opacity = '1'; // Pura visible karega
                    userProfileTrigger.style.pointerEvents = 'auto'; // Clickable banayega
                    
                    // Set avatar and name in the profile badge
                    if(userProfileAvatarImg) userProfileAvatarImg.src = currentUser.avatarUrl || `https://via.placeholder.com/40/FFFFFF/6a0dad?text=${encodeURIComponent(currentUser.name.charAt(0))}`;
                    if(userProfileNameSpan) userProfileNameSpan.textContent = currentUser.name;
                }

                if(menuAvatarImg) menuAvatarImg.src = currentUser.avatarUrl || `https://via.placeholder.com/70/FFFFFF/6a0dad?text=${encodeURIComponent(currentUser.name.charAt(0))}`;
                if(menuUsernameSpan) menuUsernameSpan.textContent = currentUser.name;

                if(nameInputInFeedbackForm) nameInputInFeedbackForm.value = currentUser.name;
                if(feedbackFormUsernameSpan) feedbackFormUsernameSpan.textContent = currentUser.name;
                if(nameInputInFeedbackForm) nameInputInFeedbackForm.disabled = true; // Disable name input when logged in
                if(feedbackFormContainer) feedbackFormContainer.style.display = 'block'; // Ensure form is visible

                // Set profile modal fields
                if (profileNameInput) profileNameInput.value = currentUser.name;
                if (profileEmailInput) profileEmailInput.value = currentUser.email;
                if (profileDisplayAvatar) profileDisplayAvatar.src = currentUser.avatarUrl || `https://via.placeholder.com/120/FFFFFF/6a0dad?text=${encodeURIComponent(currentUser.name.charAt(0))}`;

                // Disable profile edit for Google users' name and password as they log in via Google
                if (currentUser.loginMethod === 'google') {
                    if(profileNameInput) profileNameInput.disabled = true;
                    if(profileNameInput) profileNameInput.title = "Name is managed by your Google account.";
                    if(profileEditForm) saveProfileChangesBtn.disabled = true; // Disable save changes for Google users (only name can be changed, not email or password)
                    if(changePasswordForm) changePasswordForm.style.display = 'none'; // Hide password change form for Google users
                } else {
                    if(profileNameInput) profileNameInput.disabled = false;
                    if(profileNameInput) profileNameInput.title = "";
                    if(profileEditForm) saveProfileChangesBtn.disabled = false;
                    if(changePasswordForm) changePasswordForm.style.display = 'block';
                }

                // Re-enable save changes button only if input fields are changed (handled by event listeners)
                saveProfileChangesBtn.disabled = true; // Initially disabled until changes are made
                if(uploadAvatarNowBtn) uploadAvatarNowBtn.style.display = 'none'; // Hide upload button on initial load
            }
        }

        // Update UI after logout
        function updateUIAfterLogout() {
            if(loginIconTrigger) loginIconTrigger.style.display = 'flex'; // Show login icon
            // Use userProfileTrigger for the new profile badge
            if(userProfileTrigger) {
                userProfileTrigger.classList.add('hidden'); // Hide the profile badge
                // **SOLUTION:** Logout hone par avatar image source clear karein aur opacity/pointer-events set karein
                // Using a transparent GIF placeholder as a fallback image source
                if(userProfileAvatarImg) userProfileAvatarImg.src = 'data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=';
                // **ADD THESE TWO LINES FOR A MORE ROBUST HIDE:**
                userProfileTrigger.style.opacity = '0'; // Pura transparent kar dega
                userProfileTrigger.style.pointerEvents = 'none'; // Ispe click nahi hoga
            }
            if(userMenu) userMenu.classList.remove('active'); // Close menu on logout
            if(userProfileModal) userProfileModal.classList.remove('active'); // Close profile modal on logout

            if(feedbackFormContainer) feedbackFormContainer.style.display = 'block'; // Form always visible
            if(nameInputInFeedbackForm) {
                nameInputInFeedbackForm.value = '';
                nameInputInFeedbackForm.placeholder = 'Your name here if not logged in...';
                nameInputInFeedbackForm.disabled = false; // Enable name input for guests
            }
            if(feedbackFormUsernameSpan) feedbackFormUsernameSpan.textContent = 'Guest';
        }

        // Logout functionality
        if(menuLogoutLink) {
            menuLogoutLink.addEventListener('click', (e) => {
                e.preventDefault();
                if(userMenu) userMenu.classList.remove('active'); // Close menu
                showStylishPopup('confirm', 'Logout Confirmation', 'Are you sure you want to logout?', {
                    isConfirm: true,
                    confirmText: 'Logout',
                    cancelText: 'Cancel',
                    onConfirm: () => {
                        localStorage.removeItem('authToken');
                        currentUser = null;
                        // Also disable Google's auto-select for future logins
                        if (typeof google !== 'undefined' && google.accounts && google.accounts.id) {
                            google.accounts.id.disableAutoSelect();
                        }
                        updateUIAfterLogout();
                        showStylishPopup('info', 'Logged Out', 'You have been successfully logged out.');
                        fetchFeedbacks(); // Refresh feedbacks after logout
                    }
                });
            });
        }

        // View Profile Link Handler (New)
        if(menuViewProfileLink) {
            menuViewProfileLink.addEventListener('click', (e) => {
                e.preventDefault();
                if(userMenu) userMenu.classList.remove('active'); // Close user menu
                if(userProfileModal) userProfileModal.classList.add('active'); // Open profile modal
                updateUIAfterLogin(); // Refresh profile data in modal
            });
        }

        // Profile Edit Form - Save Changes (Now primarily for name)
        if(profileEditForm) {
            profileEditForm.addEventListener('input', () => {
                // Enable save button if any name change detected
                if (currentUser && currentUser.loginMethod !== 'google') { // Only for email users
                    const nameChanged = profileNameInput.value.trim() !== currentUser.name;
                    saveProfileChangesBtn.disabled = !nameChanged;
                }
            });

            profileEditForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                if (!currentUser) return showStylishPopup('error', 'Error', 'You must be logged in to update your profile.');

                const newName = profileNameInput.value.trim();
                if (!newName) {
                    return showStylishPopup('error', 'Name Required', 'Name cannot be empty.');
                }
                if (currentUser.loginMethod === 'google' && newName !== currentUser.name) {
                    return showStylishPopup('warning', 'Google User', 'Google users cannot change their name directly from here. It is managed by your Google account.');
                }

                saveProfileChangesBtn.disabled = true;
                saveProfileChangesBtn.textContent = "Saving...";

                try {
                    const data = await apiRequest(API_UPDATE_PROFILE_URL, 'PUT', { name: newName });

                    // Update localStorage with the new token if it was part of the response
                    if (data.token) { //
                        localStorage.setItem('authToken', data.token); //
                    }

                    currentUser.name = data.user.name; // Update current user name
                    updateUIAfterLogin(); // Refresh main UI elements and profile modal
                    showStylishPopup('success', 'Profile Updated!', data.message || 'Your profile name has been updated successfully!');

                } catch (error) {
                    // Error handled by apiRequest already
                } finally {
                    saveProfileChangesBtn.disabled = true; // Disable after saving
                    saveProfileChangesBtn.textContent = "Save Changes";
                }
            });
        }

        // Avatar Upload Input Change Listener (triggers UPLOAD AVATAR button)
        if (avatarUploadInput) {
            avatarUploadInput.addEventListener('change', () => {
                if (avatarUploadInput.files.length > 0) {
                    // Display selected image immediately
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        profileDisplayAvatar.src = e.target.result;
                    };
                    reader.readAsDataURL(avatarUploadInput.files[0]);

                    // Show the dedicated UPLOAD AVATAR button
                    if(uploadAvatarNowBtn) {
                        uploadAvatarNowBtn.style.display = 'block';
                        uploadAvatarNowBtn.disabled = false; // Enable it
                        uploadAvatarNowBtn.innerHTML = '<i class="fas fa-upload"></i> UPLOAD AVATAR'; // Reset text
                    }
                    // Disable save changes button as avatar upload is now a separate process
                    saveProfileChangesBtn.disabled = true;

                } else {
                    // If no file selected, hide UPLOAD AVATAR button
                    if(uploadAvatarNowBtn) uploadAvatarNowBtn.style.display = 'none';
                    // Revert to current user avatar if no file selected
                    if (currentUser) {
                        profileDisplayAvatar.src = currentUser.avatarUrl || `https://via.placeholder.com/120/FFFFFF/6a0dad?text=${encodeURIComponent(currentUser.name.charAt(0))}`;
                        // Re-evaluate if save button should be enabled based on name changes only
                        profileEditForm.dispatchEvent(new Event('input')); // Trigger input event to re-check name
                    }
                }
            });
        }

        // **********************************************
        // NEW: UPLOAD AVATAR BUTTON CLICK HANDLER (Direct to Cloudinary)
        // **********************************************
        if (uploadAvatarNowBtn) {
            uploadAvatarNowBtn.addEventListener('click', async () => {
                if (!currentUser) {
                    return showStylishPopup('error', 'Error', 'You must be logged in to upload avatar.');
                }
                if (avatarUploadInput.files.length === 0) {
                    return showStylishPopup('warning', 'No File Selected', 'Please select an image file to upload first.');
                }

                const file = avatarUploadInput.files[0];
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET); // Use your unsigned upload preset

                uploadAvatarNowBtn.disabled = true;
                uploadAvatarNowBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Uploading to Cloudinary...';

                try {
                    const xhr = new XMLHttpRequest();
                    xhr.open('POST', CLOUDINARY_UPLOAD_URL, true);

                    xhr.upload.addEventListener('progress', (event) => {
                        if (event.lengthComputable) {
                            const percent = (event.loaded / event.total) * 100;
                            uploadProgressBar.style.display = 'block';
                            progressFill.style.width = percent + '%';
                            progressText.textContent = Math.round(percent) + '%';
                        }
                    });

                    await new Promise((resolve, reject) => {
                        xhr.onload = async () => {
                            uploadProgressBar.style.display = 'none';
                            if (xhr.status >= 200 && xhr.status < 300) {
                                const cloudinaryResponse = JSON.parse(xhr.responseText);
                                const imageUrl = cloudinaryResponse.secure_url; // This is the URL from Cloudinary

                                // Now, send this URL to your backend to update the user's profile
                                try {
                                    const backendUpdateResponse = await apiRequest(API_UPDATE_PROFILE_URL, 'PUT', {
                                        name: currentUser.name, // Keep current name or send what's in the input field
                                        avatarUrl: imageUrl // Send the Cloudinary URL
                                    });

                                    // FIX STARTS HERE: Save the new token received from backend
                                    if (backendUpdateResponse.token) {
                                        localStorage.setItem('authToken', backendUpdateResponse.token);
                                    }
                                    // FIX ENDS HERE

                                    // Update currentUser and UI with new avatar URL
                                    currentUser.avatarUrl = backendUpdateResponse.user.avatarUrl;
                                    // Explicitly update the profile modal avatar display
                                    if (profileDisplayAvatar) profileDisplayAvatar.src = currentUser.avatarUrl;

                                    updateUIAfterLogin(); // Re-call this to update the corner trigger and menu avatar
                                    await fetchFeedbacks(); // Re-fetch feedbacks to update all avatars in the list
                                    avatarUploadInput.value = ''; // Clear the file input after successful upload
                                    if(uploadAvatarNowBtn) uploadAvatarNowBtn.style.display = 'none'; // Hide UPLOAD button

                                    showStylishPopup('success', 'Avatar Updated!', 'Your new avatar has been uploaded and profile updated successfully.');
                                    resolve();
                                } catch (backendError) {
                                    showStylishPopup('error', 'Profile Update Error!', backendError.message || 'Failed to update profile with new avatar URL.');
                                    reject(backendError);
                                }
                            } else {
                                const errorResponse = JSON.parse(xhr.responseText);
                                // Cloudinary error message will be in errorResponse.error.message
                                showStylishPopup('error', 'Cloudinary Upload Error!', errorResponse.error.message || 'Avatar upload failed.');
                                reject(new Error(errorResponse.error.message));
                            }
                        };
                        xhr.onerror = () => {
                            uploadProgressBar.style.display = 'none';
                            showStylishPopup('error', 'Network Error!', 'Avatar upload failed due to network issues.');
                            reject(new Error('Network error during avatar upload.'));
                        };
                        xhr.send(formData); // Send the FormData directly to Cloudinary
                    });

                } catch (error) {
                    // Any error during Cloudinary upload or backend update will be caught here
                    console.error("Overall avatar upload process failed:", error);
                } finally {
                    uploadAvatarNowBtn.disabled = false;
                    uploadAvatarNowBtn.innerHTML = '<i class="fas fa-upload"></i> UPLOAD AVATAR';
                }
            });
        }


        // Change Password Form Submission
        if(changePasswordForm) {
            changePasswordForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                if (currentUser.loginMethod === 'google') {
                    return showStylishPopup('error', 'Google User', 'Google users cannot change password from here.');
                }

                const currentPassword = currentPasswordInput.value;
                const newPassword = newPasswordProfileInput.value;
                const confirmNewPassword = confirmNewPasswordProfileInput.value;

                if (!currentPassword || !newPassword || !confirmNewPassword) {
                    return showStylishPopup('error', 'Empty Fields!', 'All password fields are required.');
                }
                if (newPassword !== confirmNewPassword) {
                    return showStylishPopup('error', 'Password Mismatch!', 'New passwords do not match.');
                }
                if (newPassword.length < 6) {
                    return showStylishPopup('error', 'Weak Password!', 'New password must be at least 6 characters.');
                }
                if (currentPassword === newPassword) {
                    return showStylishPopup('warning', 'Same Password!', 'New password cannot be the same as current password.');
                }

                changePasswordBtn.disabled = true;
                changePasswordBtn.textContent = "Changing...";

                try {
                    const data = await apiRequest(API_CHANGE_PASSWORD_URL, 'POST', { currentPassword, newPassword });
                    showStylishPopup('success', 'Password Changed!', data.message);
                    // Clear password fields
                    currentPasswordInput.value = '';
                    newPasswordProfileInput.value = '';
                    newPasswordProfileInput.classList.remove('is-valid', 'is-invalid'); // Clear validation styles
                    confirmNewPasswordProfileInput.value = '';
                    confirmNewPasswordProfileInput.classList.remove('is-valid', 'is-invalid'); // Clear validation styles
                } catch (error) {
                    // Error handled by apiRequest
                } finally {
                    changePasswordBtn.disabled = false;
                    changePasswordBtn.textContent = "Change Password";
                }
            });
        }

        // --- Star Rating Functionality ---
        starsElements.forEach(star => {
            star.addEventListener('click', () => {
                const value = parseInt(star.dataset.value);
                currentSelectedRating = value;
                ratingInput.value = value;
                updateStarVisuals(value);
            });

            star.addEventListener('mouseover', () => {
                const value = parseInt(star.dataset.value);
                updateStarVisuals(value, true); // Highlight up to this star
            });

            star.addEventListener('mouseout', () => {
                updateStarVisuals(currentSelectedRating); // Revert to selected rating or none
            });
        });

        function updateStarVisuals(highlightValue, isHover = false) {
            starsElements.forEach(star => {
                const starValue = parseInt(star.dataset.value);
                if (isHover) {
                    if (starValue <= highlightValue) {
                        star.classList.add('highlighted');
                    } else {
                        star.classList.remove('highlighted');
                    }
                    star.classList.remove('selected'); // Remove selected class during hover
                } else {
                    if (starValue <= highlightValue) {
                        star.classList.add('selected');
                    } else {
                        star.classList.remove('selected');
                    }
                    star.classList.remove('highlighted'); // Remove highlighted class after hover
                }
            });
        }

        // Submit Feedback (Removed Edit Logic)
        if(submitButton) submitButton.addEventListener('click', async () => {
            const feedbackContent = feedbackTextarea.value.trim();
            const ratingValue = ratingInput.value;
            let nameValue = nameInputInFeedbackForm.value.trim();

            if (!currentUser && !nameValue) {
                return showStylishPopup('error', 'Name Required', 'If you are not logged in, please enter your name.');
            }
            if (!feedbackContent || ratingValue === '0') {
                return showStylishPopup('error', 'Empty Fields!', 'Feedback and rating are required!');
            }
            // If not logged in, prompt to log in via the icon
            if (!currentUser) {
                showStylishPopup('warning', 'Login Required', 'Please login via the icon to submit feedback.');
                return;
            }

            let feedbackPayload = { feedback: feedbackContent, rating: parseInt(ratingValue) };
            
            // Always use POST for submission (no edit)
            const url = API_FEEDBACK_URL;
            const method = 'POST';

            submitButton.disabled = true;
            submitButton.textContent = "SUBMITTING..."; // Simplified text

            try {
                const data = await apiRequest(url, method, feedbackPayload);
                showStylishPopup('success', 'Feedback Submitted!', data.message);
                resetFeedbackForm(); // Clear form after submission
                await fetchFeedbacks(); // Refresh feedbacks to show new one
            }
            catch (error) {
                // Error handled by apiRequest function
            }
            finally {
                submitButton.disabled = false;
                submitButton.textContent = "SUBMIT FEEDBACK";
            }
        });

        // Reset Feedback Form
        function resetFeedbackForm() {
            if (currentUser) {
                nameInputInFeedbackForm.value = currentUser.name;
                feedbackFormUsernameSpan.textContent = currentUser.name;
                nameInputInFeedbackForm.disabled = true; // Keep disabled if logged in
            } else {
                nameInputInFeedbackForm.value = '';
                feedbackFormUsernameSpan.textContent = 'Guest';
                nameInputInFeedbackForm.disabled = false;
                nameInputInFeedbackForm.placeholder = 'Your name here...';
            }
            feedbackTextarea.value = '';
            ratingInput.value = '0';
            currentSelectedRating = 0;
            updateStarVisuals(0); // Reset stars
            submitButton.textContent = 'SUBMIT FEEDBACK'; // Reset button text
            // REMOVED: isEditing = false;
            // REMOVED: currentEditFeedbackId = null;
        }

        // Fetch and Display Feedbacks
        async function fetchFeedbacks() {
             try {
                const data = await apiRequest(API_FETCH_FEEDBACKS_URL, 'GET', null, false);
                console.log("DEBUG: Fetched raw feedbacks data:", data); // Check the raw data received from server

                // Clear previous feedbacks before adding new ones
                const childrenToRemove = Array.from(feedbackListContainer.children);
                childrenToRemove.forEach(child => {
                    if (child.id !== 'average-rating-display' && child.tagName.toLowerCase() !== 'h2') {
                        child.remove();
                    }
                });

                // Re-append averageRatingDisplayEl and h2Title if they were implicitly removed or if this is the first render
                if (!feedbackListContainer.contains(averageRatingDisplayEl)) {
                    feedbackListContainer.prepend(averageRatingDisplayEl);
                }
                let h2Title = feedbackListContainer.querySelector('h2');
                if (!h2Title) {
                     h2Title = document.createElement('h2');
                     h2Title.textContent = 'Recent Feedbacks';
                     feedbackListContainer.insertBefore(h2Title, feedbackListContainer.querySelector('.feedback-item') || null);
                }

                if (data.length === 0) {
                    const msgP = document.createElement('p');
                    msgP.textContent = 'No feedback yet. Be the first one!';
                    msgP.style.textAlign='center';
                    msgP.style.padding='20px';
                    msgP.style.color='rgba(255,255,255,0.7)';
                    feedbackListContainer.appendChild(msgP);
                    updateAverageRating(0, 0); // Display 0 average if no feedbacks
                } else {
                    const totalRatings = data.reduce((sum, fb) => {
                        // Debugging logs for each rating
                        console.log(`DEBUG: Processing feedback ID: ${fb._id}, Rating: ${fb.rating}, Type: ${typeof fb.rating}`);
                        // Ensure rating is a number before adding, or convert if it's a string
                        const ratingAsNumber = typeof fb.rating === 'number' ? fb.rating : parseInt(fb.rating);
                        if (isNaN(ratingAsNumber)) {
                            console.warn(`WARN: Feedback ID: ${fb._id} has invalid rating value: ${fb.rating}. Treating as 0 for average calculation.`);
                            return sum; // Don't add to sum if it's invalid
                        }
                        return sum + ratingAsNumber;
                    }, 0);

                    const average = totalRatings / data.length;
                    console.log("DEBUG: Calculated totalRatings:", totalRatings, "Data Length:", data.length, "Calculated Average:", average);
                    updateAverageRating(average, data.length);
                    data.forEach((fb, index) => addFeedbackToDOM(fb, index));
                }
            } catch (err) {
                console.error("Error fetching feedbacks:", err); // Log the full error
            }
        }

        // Update Average Rating Display
        function updateAverageRating(avg, count) {
            const avgNum = parseFloat(avg);
            let starsHtml = '☆☆☆☆☆'; // Default to empty stars
            if (!isNaN(avgNum) && avgNum > 0) {
                const fullStars = Math.floor(avgNum);
                const halfStar = (avgNum % 1) >= 0.5 ? '★' : ''; // Simple half star logic
                starsHtml = '★'.repeat(fullStars) + halfStar + '☆'.repeat(5 - fullStars - (halfStar ? 1 : 0));
            }
            averageRatingDisplayEl.innerHTML = `
        <div class="average-rating-container">
            <h3>Overall Average Rating</h3>
            <div class="average-number">${isNaN(avgNum) ? '0.0' : avgNum.toFixed(1)}</div>
            <div class="average-stars">${starsHtml}</div>
            <div class="total-feedbacks-count">(${count} feedbacks)</div>
        </div>
    `;
            // Animate the average rating container in if it's new/hidden
            setTimeout(() => {
                const avgContainer = averageRatingDisplayEl.querySelector('.average-rating-container');
                if (avgContainer && !avgContainer.classList.contains('animate-in')) {
                    avgContainer.classList.add('animate-in');
                }
            }, 50);
        }

        // Add Feedback to DOM (Removed Edit Button HTML & Logic)
        function addFeedbackToDOM(fbData, index) {
            const item = document.createElement('div');
            item.className = 'feedback-item';
            // REMOVED: item.dataset.feedbackId = fbData._id; // Store ID for potential updates/deletions

            const avatarImg = document.createElement('img');
            avatarImg.className = 'avatar-img';
            const defaultAvatarChar = (fbData.name && fbData.name.length > 0 ? fbData.name.charAt(0).toUpperCase() : 'X');
            avatarImg.src = fbData.avatarUrl || `https://via.placeholder.com/50/6a0dad/FFFFFF?text=${encodeURIComponent(defaultAvatarChar)}`;
            avatarImg.alt = fbData.name || 'User Avatar';
            // Fallback for broken image links
            avatarImg.onerror = function() {
                this.src = `https://via.placeholder.com/50/6a0dad/FFFFFF?text=${encodeURIComponent(defaultAvatarChar)}`;
            };

            const detailsDiv = document.createElement('div');
            detailsDiv.className = 'feedback-details';

            const strongName = document.createElement('strong');
            let nameContent = fbData.name || 'Anonymous';
            let userTypeTag = '';
            // Use userId.loginMethod if available, otherwise fallback based on googleIdSubmitter or default to email
            if (fbData.userId && fbData.userId.loginMethod) {
                userTypeTag = fbData.userId.loginMethod === 'google' ? `<span class="user-type-indicator google-user-indicator" title="Google User">G</span>` : `<span class="user-type-indicator email-user-indicator" title="Email User">E</span>`;
            } else if (fbData.googleIdSubmitter) { // Fallback for older feedbacks or if userId.loginMethod not populated
                userTypeTag = `<span class="user-type-indicator google-user-indicator" title="Google User">G</span>`;
            } else {
                userTypeTag = `<span class="user-type-indicator email-user-indicator" title="Email User">E</span>`;
            }
            strongName.innerHTML = `${nameContent} ${userTypeTag}`;


            // REMOVED: if (fbData.isEdited) { ... } (edited-tag HTML)

            const starsDiv = document.createElement('div');
            starsDiv.className = 'feedback-stars';
            starsDiv.textContent = '★'.repeat(fbData.rating) + '☆'.repeat(5 - fbData.rating);

            const pFeedback = document.createElement('p');
            pFeedback.textContent = fbData.feedback;

            const timestampDiv = document.createElement('div');
            timestampDiv.className = 'feedback-timestamp';
            try {
                // Indian Time Zone for timestamp
                timestampDiv.textContent = `Posted: ${new Date(fbData.timestamp).toLocaleString('en-IN', { timeZone: 'Asia/Kolkata', day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit', hour12: true })}`;
            } catch(e) {
                timestampDiv.textContent = `Posted: ${new Date(fbData.timestamp).toLocaleString('en-US')}`; // Fallback
            }

            detailsDiv.append(strongName, starsDiv, pFeedback, timestampDiv);

            // REMOVED: Edit Button HTML creation and event listener

            // Admin Reply (if exists)
            if (fbData.replies && fbData.replies.length > 0) {
                const latestReply = fbData.replies[fbData.replies.length - 1]; // Get the most recent reply
                if (latestReply && latestReply.text) {
                    const adminReplyDiv = document.createElement('div');
                    adminReplyDiv.className = 'admin-reply';

                    const adminAvatar = document.createElement('img');
                    adminAvatar.className = 'admin-reply-avatar';
                    adminAvatar.src = 'https://i.ibb.co/FsSs4SG/creator-avatar.png'; // Nobita's avatar (or specific admin avatar from backend)
                    adminAvatar.alt = 'Admin';

                    const adminReplyContent = document.createElement('div');
                    adminReplyContent.className = 'admin-reply-content';
                    let replyTimestampText = '';
                    try {
                        replyTimestampText = `(${new Date(latestReply.timestamp).toLocaleString('en-IN', { timeZone: 'Asia/Kolkata', dateStyle:'short', timeStyle:'short' })})`;
                    } catch(e) {
                        replyTimestampText = `(${new Date(latestReply.timestamp).toLocaleString('en-US')})`;
                    }
                    adminReplyContent.innerHTML = `<strong>(${(latestReply.adminName || 'Admin')}):</strong> ${latestReply.text} <span class="reply-timestamp">${replyTimestampText}</span>`;

                    adminReplyDiv.append(adminAvatar, adminReplyContent);
                    detailsDiv.appendChild(adminReplyDiv);
                }
            }

            item.append(avatarImg, detailsDiv);
            feedbackListContainer.appendChild(item); // Add the feedback item to the list
        }

        // Initial calls on load
        updateUIAfterLogout(); // Set initial UI state (guest mode)
        checkLoginStatus(); // Check if user is already logged in via token
    });
</script>

</body>
</html>
